<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vinyl Collection</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;--surface:#181818;--card:#1e1e1e;--border:#2a2a2a;
  --text:#f0f0f0;--muted:#888;--accent:#c8a951;--accent2:#e8c97a;
  --danger:#e05555;--radius:10px;--radius-sm:6px
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;min-height:100vh}
a{color:inherit;text-decoration:none}

/* layout */
.app{max-width:1280px;margin:0 auto;padding:0 24px 48px}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 24px;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:24px}
.logo-row{display:flex;align-items:center;gap:14px}
.disc{width:42px;height:42px;border-radius:50%;background:#111;border:3px solid #333;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.disc::after{content:'';width:12px;height:12px;border-radius:50%;background:var(--accent);position:absolute}
.app-name{font-size:20px;font-weight:600;letter-spacing:-.3px}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:22px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.stat-val{font-size:26px;font-weight:600;color:var(--accent2)}

/* toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;height:38px}
.search input{background:transparent;border:none;outline:none;color:var(--text);font-size:14px;width:100%}
.search i{color:var(--muted);font-size:17px}
select,input{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;height:38px;font-size:14px;outline:none}
select:focus,input:focus{border-color:var(--accent)}

/* buttons */
.btn{height:38px;padding:0 16px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);white-space:nowrap;transition:all .15s}
.btn:hover{border-color:#444;background:#252525}
.btn-gold{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.btn-gold:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-sm{height:30px;padding:0 12px;font-size:13px}
.btn-ghost{background:transparent;border:none;color:var(--muted);padding:0 8px}
.btn-ghost:hover{color:var(--text);background:var(--surface)}
.btn-danger{color:var(--danger);border-color:#3a1a1a}
.btn-danger:hover{background:#2a0f0f}
.view-toggle{display:flex;gap:4px}
.view-btn{width:38px;height:38px;padding:0;display:flex;align-items:center;justify-content:center;font-size:17px}
.view-btn.active{border-color:var(--accent);color:var(--accent)}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}
.vcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
.vcard:hover{border-color:#444;transform:translateY(-2px)}
.vcard-cover{width:100%;aspect-ratio:1;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.vcard-cover img{width:100%;height:100%;object-fit:cover}
.vcard-cover .no-cover{display:flex;flex-direction:column;align-items:center;gap:6px;color:#333;font-size:11px}
.vcard-cover .no-cover i{font-size:36px}
.vcard-body{padding:10px 12px 12px}
.vcard-artist{font-size:11px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard-album{font-size:13px;font-weight:500;line-height:1.35;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px}
.vcard-foot{display:flex;align-items:center;justify-content:space-between}
.vcard-year{font-size:12px;color:var(--muted)}
.stars{display:flex;gap:1px}
.star{font-size:11px;color:var(--accent)}
.star.off{color:#333}

/* list */
.list{display:flex;flex-direction:column;gap:8px}
.litem{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s}
.litem:hover{border-color:#444}
.lthumb{width:46px;height:46px;border-radius:6px;background:#111;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#333}
.lthumb img{width:100%;height:100%;object-fit:cover}
.linfo{flex:1;min-width:0}
.lalbum{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lartist{font-size:12px;color:var(--muted);margin-top:2px}
.lright{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface);color:var(--muted);border:1px solid var(--border)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;position:relative}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.modal-title{font-size:16px;font-weight:600}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* detail */
.detail-cover{width:100%;aspect-ratio:1;max-height:240px;object-fit:cover;border-radius:var(--radius-sm);display:block;margin-bottom:16px;background:#111}
.detail-cover-ph{width:100%;height:180px;background:#111;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:#2a2a2a}
.detail-title{font-size:22px;font-weight:700;margin-bottom:4px;line-height:1.2}
.detail-artist{font-size:14px;color:var(--muted);margin-bottom:10px}
.detail-stars{margin-bottom:16px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:3px}
.detail-item span{font-size:14px;font-weight:500}

/* form */
.form-group{margin-bottom:14px}
.form-group label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:14px;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rating-row{display:flex;gap:4px}
.rstar{font-size:22px;cursor:pointer;color:#333;transition:color .1s;line-height:1}
.rstar.on{color:var(--accent)}
.cover-drop{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:20px;text-align:center;cursor:pointer;position:relative;transition:border-color .15s}
.cover-drop:hover{border-color:var(--accent)}
.cover-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.cover-preview{width:100%;max-height:140px;object-fit:cover;border-radius:var(--radius-sm);margin-top:10px;display:block}
.check-row{display:flex;align-items:center;gap:8px;font-size:14px;margin-top:4px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent)}

/* empty */
.empty{text-align:center;padding:64px 20px;color:var(--muted)}
.empty i{font-size:52px;opacity:.2;display:block;margin-bottom:12px}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:#f0f0f0;color:#111;padding:11px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;z-index:300;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* auth badge */
.auth-badge{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm)}
.auth-badge.authed{color:var(--accent);border-color:#3a2e12}

/* login modal */
.lock-icon{font-size:40px;text-align:center;margin-bottom:16px;color:var(--accent)}
.err-msg{color:var(--danger);font-size:13px;text-align:center;margin-top:8px;min-height:18px}

@media(max-width:600px){
  .app{padding:0 12px 32px}
  .form-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .header-right .btn span{display:none}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-row">
      <div class="disc"></div>
      <div>
        <div class="app-name">Vinyl Collection</div>
      </div>
    </div>
    <div class="header-right">
      <div class="auth-badge" id="authBadge">
        <i class="ti ti-lock"></i><span>Visitor</span>
      </div>
      <button class="btn" id="loginBtn"><i class="ti ti-login"></i><span>Edit mode</span></button>
      <button class="btn" id="exportBtn"><i class="ti ti-download"></i><span>Export CSV</span></button>
      <label class="btn" id="importLabel" style="display:none">
        <i class="ti ti-upload"></i><span>Import CSV</span>
        <input type="file" accept=".csv" id="importInput" style="display:none">
      </label>
      <button class="btn btn-gold" id="addBtn" style="display:none">
        <i class="ti ti-plus"></i><span>Add record</span>
      </button>
    </div>
  </header>

  <div class="stats" id="statsRow"></div>

  <div class="toolbar">
    <div class="search">
      <i class="ti ti-search"></i>
      <input type="text" id="searchInput" placeholder="Search artist, album, genre…">
    </div>
    <select id="genreFilter"><option value="">All genres</option></select>
    <select id="buyerFilter"><option value="">All buyers</option></select>
    <select id="sortSel">
      <option value="artist">Sort: Artist</option>
      <option value="album_name">Sort: Album</option>
      <option value="year">Sort: Year ↓</option>
      <option value="my_rating">Sort: My rating ↓</option>
      <option value="play_count">Sort: Plays ↓</option>
    </select>
    <div class="view-toggle">
      <button class="btn view-btn active" id="gridBtn" aria-label="Grid view"><i class="ti ti-layout-grid"></i></button>
      <button class="btn view-btn" id="listBtn" aria-label="List view"><i class="ti ti-list"></i></button>
    </div>
  </div>

  <div id="recordsContainer"></div>
</div>

<!-- Detail modal -->
<div class="overlay hidden" id="detailOverlay">
  <div class="modal" id="detailModal">
    <div class="modal-head">
      <span class="modal-title">Record detail</span>
      <button class="btn btn-ghost btn-sm" onclick="closeDetail()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-foot" id="detailFoot"></div>
  </div>
</div>

<!-- Edit/Add modal -->
<div class="overlay hidden" id="formOverlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="formTitle">Add record</span>
      <button class="btn btn-ghost btn-sm" onclick="closeForm()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="cover-drop" id="coverDrop">
        <input type="file" accept="image/*" id="coverInput">
        <div id="coverDropInner">
          <i class="ti ti-photo" style="font-size:28px;opacity:.3;display:block;margin-bottom:6px"></i>
          <span style="font-size:13px;color:var(--muted)">Click to upload album cover</span>
        </div>
        <img id="coverPreview" class="cover-preview" style="display:none">
      </div>
      <div style="height:14px"></div>
      <div class="form-grid">
        <div class="form-group"><label>Artist</label><input id="fArtist" placeholder="Artist name"></div>
        <div class="form-group"><label>Album name</label><input id="fAlbum" placeholder="Album title"></div>
        <div class="form-group"><label>Year</label><input id="fYear" type="number" placeholder="1975"></div>
        <div class="form-group">
          <label>Genre</label>
          <select id="fGenre">
            <option value="">Select genre</option>
            <option>Rock</option><option>Pop</option><option>Jazz</option><option>Blues</option>
            <option>Classical</option><option>Electronic</option><option>Hip-Hop</option>
            <option>R&B</option><option>Folk</option><option>Country</option><option>Latin</option>
            <option>Reggae</option><option>Metal</option><option>Punk</option><option>Soul</option>
            <option>Funk</option><option>Easy listening</option><option>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Bought date</label><input id="fDate" type="date"></div>
        <div class="form-group"><label>Bought at</label><input id="fWhere" placeholder="Store / city"></div>
        <div class="form-group"><label>Bought by</label><input id="fBuyer" placeholder="Name"></div>
        <div class="form-group"><label>Play count</label><input id="fPlays" type="number" min="0" value="0"></div>
        <div class="form-group"><label>Last cleaned</label><input id="fCleaned" type="date"></div>
      </div>
      <div class="form-group">
        <label>My rating (out of 10)</label>
        <div class="rating-row" id="myRatingRow"></div>
      </div>
      <div class="form-group">
        <label>Wife rating (out of 10)</label>
        <div class="rating-row" id="wifeRatingRow"></div>
      </div>
      <div class="check-row">
        <input type="checkbox" id="fHaveIt" checked>
        <label for="fHaveIt">I have this record in my collection</label>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeForm()">Cancel</button>
      <button class="btn btn-gold" id="formSaveBtn">Save</button>
    </div>
  </div>
</div>

<!-- Login modal -->
<div class="overlay hidden" id="loginOverlay">
  <div class="modal" style="max-width:360px">
    <div class="modal-head">
      <span class="modal-title">Edit mode</span>
      <button class="btn btn-ghost btn-sm" onclick="closeLogin()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="lock-icon"><i class="ti ti-lock"></i></div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pwInput" placeholder="Enter edit password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="err-msg" id="loginErr"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeLogin()">Cancel</button>
      <button class="btn btn-gold" onclick="doLogin()">Unlock editing</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── state ──────────────────────────────────────────────────────────────────
let records = [];
let authed = false;
let view = 'grid';
let editingId = null;
let myRating = 0, wifeRating = 0;
let coverDataUri = '';
let confirmDeleteId = null;

// ── init ───────────────────────────────────────────────────────────────────
async function init() {
  await checkAuth();
  await loadRecords();
  buildRatingRows();
  bindEvents();
}

async function checkAuth() {
  const r = await fetch('/api/auth/status');
  const d = await r.json();
  setAuthed(d.authed);
}

function setAuthed(val) {
  authed = val;
  const badge = document.getElementById('authBadge');
  const loginBtn = document.getElementById('loginBtn');
  badge.className = 'auth-badge' + (val ? ' authed' : '');
  badge.innerHTML = val
    ? '<i class="ti ti-lock-open"></i><span>Edit mode</span>'
    : '<i class="ti ti-lock"></i><span>Visitor</span>';
  loginBtn.innerHTML = val
    ? '<i class="ti ti-logout"></i><span>Lock</span>'
    : '<i class="ti ti-login"></i><span>Edit mode</span>';
  document.getElementById('addBtn').style.display   = val ? '' : 'none';
  document.getElementById('importLabel').style.display = val ? '' : 'none';
}

async function loadRecords() {
  const r = await fetch('/api/records');
  records = await r.json();
  render();
}

// ── render ─────────────────────────────────────────────────────────────────
function filtered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const g = document.getElementById('genreFilter').value;
  const b = document.getElementById('buyerFilter').value;
  const s = document.getElementById('sortSel').value;
  return records.filter(r => {
    if (q && !`${r.artist} ${r.album_name} ${r.genre}`.toLowerCase().includes(q)) return false;
    if (g && r.genre !== g) return false;
    if (b && r.bought_by !== b) return false;
    return true;
  }).sort((a, b_) => {
    if (['year','my_rating','play_count'].includes(s)) return (Number(b_[s])||0) - (Number(a[s])||0);
    return (a[s]||'').localeCompare(b_[s]||'');
  });
}

function render() {
  const recs = filtered();
  renderStats();
  renderFilters();
  const c = document.getElementById('recordsContainer');
  if (!recs.length) {
    c.innerHTML = `<div class="empty"><i class="ti ti-disc"></i>${records.length?'No records match your search.':'No records yet. Add your first vinyl!'}</div>`;
    return;
  }
  if (view === 'grid') {
    c.innerHTML = `<div class="grid">${recs.map(r => cardHTML(r)).join('')}</div>`;
  } else {
    c.innerHTML = `<div class="list">${recs.map(r => listItemHTML(r)).join('')}</div>`;
  }
  c.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => openDetail(Number(el.dataset.id)));
  });
}

function starsHTML(n, max=10) {
  let s='';
  for(let i=1;i<=max;i++) s+=`<span class="star${i<=n?'':' off'}">★</span>`;
  return `<div class="stars">${s}</div>`;
}

function coverImgHTML(r, cls='') {
  if (r.cover_data) return `<img src="${r.cover_data}" alt="${esc(r.album_name)}" class="${cls}" loading="lazy" onerror="this.style.display='none'">`;
  return `<div class="no-cover"><i class="ti ti-disc"></i></div>`;
}

function cardHTML(r) {
  return `<div class="vcard" data-id="${r.id}">
    <div class="vcard-cover">${coverImgHTML(r,'')}</div>
    <div class="vcard-body">
      <div class="vcard-artist">${esc(r.artist)||'Unknown'}</div>
      <div class="vcard-album">${esc(r.album_name)||'Untitled'}</div>
      <div class="vcard-foot">
        <span class="vcard-year">${esc(r.year)||'—'}</span>
        ${r.my_rating > 0 ? starsHTML(r.my_rating) : ''}
      </div>
    </div>
  </div>`;
}

function listItemHTML(r) {
  const thumb = r.cover_data
    ? `<img src="${r.cover_data}" alt="" style="width:46px;height:46px;object-fit:cover" onerror="this.style.display='none'">`
    : `<i class="ti ti-disc" style="font-size:20px;opacity:.2"></i>`;
  return `<div class="litem" data-id="${r.id}">
    <div class="lthumb">${thumb}</div>
    <div class="linfo">
      <div class="lalbum">${esc(r.album_name)||'Untitled'}</div>
      <div class="lartist">${esc(r.artist)||'Unknown'}${r.year?' · '+r.year:''}</div>
    </div>
    <div class="lright">
      ${r.genre?`<span class="pill">${esc(r.genre)}</span>`:''}
      ${r.my_rating>0?starsHTML(r.my_rating):''}
    </div>
  </div>`;
}

function renderStats() {
  const avg = records.length ? (records.reduce((s,r)=>s+(Number(r.my_rating)||0),0)/records.length).toFixed(1) : '—';
  const plays = records.reduce((s,r)=>s+(Number(r.play_count)||0),0);
  const genres = new Set(records.map(r=>r.genre).filter(Boolean)).size;
  document.getElementById('statsRow').innerHTML = [
    ['Total records', records.length],
    ['Avg rating', avg],
    ['Total plays', plays],
    ['Genres', genres],
  ].map(([l,v])=>`<div class="stat"><div class="stat-label">${l}</div><div class="stat-val">${v}</div></div>`).join('');
}

function renderFilters() {
  const genres = [...new Set(records.map(r=>r.genre).filter(Boolean))].sort();
  const buyers = [...new Set(records.map(r=>r.bought_by).filter(Boolean))].sort();
  const gf = document.getElementById('genreFilter');
  const curG = gf.value;
  gf.innerHTML = '<option value="">All genres</option>' + genres.map(g=>`<option${g===curG?' selected':''}>${esc(g)}</option>`).join('');
  const bf = document.getElementById('buyerFilter');
  const curB = bf.value;
  bf.innerHTML = '<option value="">All buyers</option>' + buyers.map(b=>`<option${b===curB?' selected':''}>${esc(b)}</option>`).join('');
  bf.parentElement.style.display = buyers.length > 1 ? '' : 'none';
}

// ── detail modal ───────────────────────────────────────────────────────────
function openDetail(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  confirmDeleteId = null;

  const coverEl = r.cover_data
    ? `<img src="${r.cover_data}" class="detail-cover" alt="${esc(r.album_name)}" onerror="this.style.display='none'">`
    : `<div class="detail-cover-ph"><i class="ti ti-disc" style="font-size:56px"></i></div>`;

  const fields = [
    ['Year', r.year], ['Genre', r.genre],
    ['Bought date', r.bought_date], ['Bought at', r.bought_where],
    ['Bought by', r.bought_by], ['My rating', r.my_rating ? r.my_rating+'/10' : '—'],
    ['Wife rating', r.wife_rating ? r.wife_rating+'/10' : '—'], ['Play count', r.play_count||0],
    ['Last cleaned', r.last_cleaned||'—'], ['In collection', r.have_it ? 'Yes' : 'No'],
  ];

  document.getElementById('detailBody').innerHTML = `
    ${coverEl}
    <div class="detail-title">${esc(r.album_name)||'Untitled'}</div>
    <div class="detail-artist">${esc(r.artist)||'Unknown'}</div>
    <div class="detail-stars">${r.my_rating > 0 ? starsHTML(r.my_rating) : ''}</div>
    <div class="detail-grid">
      ${fields.map(([l,v])=>`<div class="detail-item"><label>${l}</label><span>${esc(String(v||'—'))}</span></div>`).join('')}
    </div>`;

  renderDetailFoot(r.id);
  document.getElementById('detailOverlay').classList.remove('hidden');
}

function renderDetailFoot(id) {
  const foot = document.getElementById('detailFoot');
  if (confirmDeleteId === id) {
    foot.innerHTML = `
      <span style="font-size:13px;color:var(--muted);margin-right:auto">Delete this record?</span>
      <button class="btn btn-danger btn-sm" onclick="doDelete(${id})">Yes, delete</button>
      <button class="btn btn-sm" onclick="confirmDeleteId=null;renderDetailFoot(${id})">Cancel</button>`;
  } else {
    foot.innerHTML = authed ? `
      <button class="btn btn-danger btn-sm" onclick="confirmDeleteId=${id};renderDetailFoot(${id})"><i class="ti ti-trash"></i> Delete</button>
      <button class="btn" onclick="openEdit(${id})"><i class="ti ti-edit"></i> Edit</button>` : '';
  }
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.add('hidden');
  confirmDeleteId = null;
}

async function doDelete(id) {
  await fetch(`/api/records/${id}`, {method:'DELETE'});
  records = records.filter(r => r.id !== id);
  closeDetail();
  render();
  toast('Record deleted');
}

// ── form modal ─────────────────────────────────────────────────────────────
function buildRatingRows() {
  ['myRatingRow','wifeRatingRow'].forEach((rowId, idx) => {
    const row = document.getElementById(rowId);
    for (let i = 1; i <= 10; i++) {
      const s = document.createElement('span');
      s.className = 'rstar';
      s.textContent = '★';
      s.dataset.idx = idx;
      s.dataset.val = i;
      s.addEventListener('click', () => {
        if (idx === 0) { myRating = i; } else { wifeRating = i; }
        updateRatingUI();
      });
      s.addEventListener('mouseenter', () => highlightStars(rowId, i));
      s.addEventListener('mouseleave', () => updateRatingUI());
      row.appendChild(s);
    }
  });
}

function highlightStars(rowId, n) {
  document.querySelectorAll(`#${rowId} .rstar`).forEach(s => {
    s.classList.toggle('on', Number(s.dataset.val) <= n);
  });
}

function updateRatingUI() {
  document.querySelectorAll('#myRatingRow .rstar').forEach(s => s.classList.toggle('on', Number(s.dataset.val) <= myRating));
  document.querySelectorAll('#wifeRatingRow .rstar').forEach(s => s.classList.toggle('on', Number(s.dataset.val) <= wifeRating));
}

function openAdd() {
  editingId = null;
  myRating = 0; wifeRating = 0; coverDataUri = '';
  document.getElementById('formTitle').textContent = 'Add record';
  ['fArtist','fAlbum','fYear','fWhere','fBuyer'].forEach(id => document.getElementById(id).value='');
  document.getElementById('fGenre').value='';
  document.getElementById('fDate').value='';
  document.getElementById('fCleaned').value='';
  document.getElementById('fPlays').value='0';
  document.getElementById('fHaveIt').checked=true;
  document.getElementById('coverPreview').style.display='none';
  document.getElementById('coverDropInner').style.display='';
  updateRatingUI();
  document.getElementById('formSaveBtn').onclick = submitForm;
  document.getElementById('formOverlay').classList.remove('hidden');
}

function openEdit(id) {
  closeDetail();
  const r = records.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  myRating = Number(r.my_rating)||0;
  wifeRating = Number(r.wife_rating)||0;
  coverDataUri = r.cover_data||'';
  document.getElementById('formTitle').textContent = 'Edit record';
  document.getElementById('fArtist').value = r.artist||'';
  document.getElementById('fAlbum').value = r.album_name||'';
  document.getElementById('fYear').value = r.year||'';
  document.getElementById('fGenre').value = r.genre||'';
  document.getElementById('fDate').value = r.bought_date||'';
  document.getElementById('fWhere').value = r.bought_where||'';
  document.getElementById('fBuyer').value = r.bought_by||'';
  document.getElementById('fPlays').value = r.play_count||0;
  document.getElementById('fCleaned').value = r.last_cleaned||'';
  document.getElementById('fHaveIt').checked = !!r.have_it;
  if (coverDataUri) {
    document.getElementById('coverPreview').src = coverDataUri;
    document.getElementById('coverPreview').style.display='block';
    document.getElementById('coverDropInner').style.display='none';
  } else {
    document.getElementById('coverPreview').style.display='none';
    document.getElementById('coverDropInner').style.display='';
  }
  updateRatingUI();
  document.getElementById('formSaveBtn').onclick = submitForm;
  document.getElementById('formOverlay').classList.remove('hidden');
}

function closeForm() {
  document.getElementById('formOverlay').classList.add('hidden');
}

async function submitForm() {
  const body = {
    artist:       document.getElementById('fArtist').value,
    album_name:   document.getElementById('fAlbum').value,
    year:         document.getElementById('fYear').value,
    genre:        document.getElementById('fGenre').value,
    bought_date:  document.getElementById('fDate').value,
    bought_where: document.getElementById('fWhere').value,
    bought_by:    document.getElementById('fBuyer').value,
    play_count:   Number(document.getElementById('fPlays').value)||0,
    last_cleaned: document.getElementById('fCleaned').value,
    have_it:      document.getElementById('fHaveIt').checked,
    my_rating:    myRating,
    wife_rating:  wifeRating,
    cover_data:   coverDataUri,
  };
  const url = editingId ? `/api/records/${editingId}` : '/api/records';
  const method = editingId ? 'PUT' : 'POST';
  const r = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const rec = await r.json();
  if (editingId) {
    records = records.map(x => x.id === editingId ? rec : x);
    toast('Changes saved');
  } else {
    records.push(rec);
    toast('Record added!');
  }
  closeForm();
  render();
}

// ── cover upload ───────────────────────────────────────────────────────────
document.getElementById('coverInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    coverDataUri = ev.target.result;
    document.getElementById('coverPreview').src = coverDataUri;
    document.getElementById('coverPreview').style.display='block';
    document.getElementById('coverDropInner').style.display='none';
  };
  reader.readAsDataURL(file);
  e.target.value='';
});

// ── login ──────────────────────────────────────────────────────────────────
function openLogin() { document.getElementById('loginOverlay').classList.remove('hidden'); document.getElementById('pwInput').value=''; document.getElementById('loginErr').textContent=''; }
function closeLogin() { document.getElementById('loginOverlay').classList.add('hidden'); }

async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const r = await fetch('/api/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw})});
  if (r.ok) { setAuthed(true); closeLogin(); render(); toast('Edit mode unlocked'); }
  else { document.getElementById('loginErr').textContent='Wrong password. Try again.'; }
}

async function doLogout() {
  await fetch('/api/auth/logout', {method:'POST'});
  setAuthed(false);
  render();
  toast('Locked');
}

// ── import / export ────────────────────────────────────────────────────────
document.getElementById('importInput').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  const fd = new FormData(); fd.append('file', file);
  const r = await fetch('/api/import', {method:'POST', body:fd});
  const d = await r.json();
  if (d.imported != null) { await loadRecords(); toast(`Imported ${d.imported} records!`); }
  else toast('Import failed: ' + (d.error||'unknown error'));
  e.target.value='';
});

document.getElementById('exportBtn').addEventListener('click', () => {
  window.location.href = '/api/export';
});

// ── events ─────────────────────────────────────────────────────────────────
function bindEvents() {
  document.getElementById('loginBtn').addEventListener('click', () => authed ? doLogout() : openLogin());
  document.getElementById('addBtn').addEventListener('click', openAdd);
  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('genreFilter').addEventListener('change', render);
  document.getElementById('buyerFilter').addEventListener('change', render);
  document.getElementById('sortSel').addEventListener('change', render);
  document.getElementById('gridBtn').addEventListener('click', () => { view='grid'; document.getElementById('gridBtn').classList.add('active'); document.getElementById('listBtn').classList.remove('active'); render(); });
  document.getElementById('listBtn').addEventListener('click', () => { view='list'; document.getElementById('listBtn').classList.add('active'); document.getElementById('gridBtn').classList.remove('active'); render(); });
  document.getElementById('detailOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeDetail(); });
  document.getElementById('formOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeForm(); });
  document.getElementById('loginOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeLogin(); });
}

// ── toast ──────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
