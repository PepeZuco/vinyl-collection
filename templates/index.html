<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vinyl Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;--surface:#141414;--card:#181818;--border:#242424;
  --text:#e8e8e0;--muted:#555;--accent:#c8a951;--danger:#c0392b;
  --radius:4px;--radius-sm:3px;--font:'Courier Prime',monospace
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;letter-spacing:.01em}
a{color:inherit;text-decoration:none}

.app{max-width:1200px;margin:0 auto;padding:0 24px 64px}

/* header */
header{display:flex;align-items:baseline;justify-content:space-between;padding:28px 0 20px;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:24px}
.logo-row{display:flex;align-items:baseline;gap:12px}
.app-name{font-size:18px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.record-count{font-size:13px;color:var(--muted)}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;height:34px}
.search input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;width:100%;font-family:var(--font)}
.search i{color:var(--muted);font-size:15px}
select{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 8px;height:34px;font-size:13px;outline:none;font-family:var(--font);cursor:pointer}
select:focus{border-color:var(--accent)}
select option{background:#1a1a1a}

/* buttons */
.btn{height:34px;padding:0 14px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap;transition:all .12s;font-family:var(--font);letter-spacing:.02em}
.btn:hover{border-color:#444;color:var(--text)}
.btn-primary{border-color:var(--accent);color:var(--accent)}
.btn-primary:hover{background:rgba(200,169,81,.08)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-ghost{background:transparent;border:none;color:var(--muted);padding:0 6px}
.btn-ghost:hover{color:var(--text)}
.btn-danger{color:var(--danger);border-color:#2a1010}
.btn-danger:hover{background:rgba(192,57,43,.08)}
.view-toggle{display:flex;gap:4px}
.view-btn{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.view-btn.active{border-color:#444;color:var(--text)}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.vcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .12s}
.vcard:hover{border-color:#333}
.vcard-cover{width:100%;aspect-ratio:1;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
.vcard-cover img{width:100%;height:100%;object-fit:cover}
.vcard-cover .no-cover{display:flex;flex-direction:column;align-items:center;gap:4px;color:#2a2a2a;font-size:10px;font-family:var(--font)}
.vcard-cover .no-cover i{font-size:32px}
.vcard-body{padding:8px 10px 10px}
.vcard-artist{font-size:10px;color:var(--muted);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.06em}
.vcard-album{font-size:12px;font-weight:700;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px}
.vcard-foot{display:flex;align-items:center;justify-content:space-between}
.vcard-year{font-size:11px;color:var(--muted)}
.stars{display:flex;gap:1px}
.star{font-size:10px;color:var(--accent)}
.star.off{color:#2a2a2a}

/* list */
.list{display:flex;flex-direction:column;gap:1px}
.litem{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .12s;margin-bottom:4px}
.litem:hover{border-color:#333}
.lthumb{width:42px;height:42px;border-radius:2px;background:#111;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#2a2a2a}
.lthumb img{width:100%;height:100%;object-fit:cover}
.linfo{flex:1;min-width:0}
.lalbum{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lartist{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.lright{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pill{font-size:10px;padding:2px 7px;border-radius:2px;background:transparent;color:var(--muted);border:1px solid var(--border);font-family:var(--font);text-transform:uppercase;letter-spacing:.05em}
.ldate{font-size:11px;color:var(--muted)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:540px;max-height:92vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.modal-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.modal-body{padding:18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* detail */
.detail-cover{width:100%;aspect-ratio:1;max-height:220px;object-fit:cover;border-radius:var(--radius-sm);display:block;margin-bottom:16px}
.detail-cover-ph{width:100%;height:160px;background:#111;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:#222}
.detail-title{font-size:20px;font-weight:700;margin-bottom:3px;line-height:1.2}
.detail-artist{font-size:11px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.07em}
.detail-stars{margin-bottom:14px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:block;margin-bottom:2px}
.detail-item span{font-size:13px;font-weight:700}

/* form */
.form-group{margin-bottom:12px}
.form-group label{font-size:10px;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 9px;font-size:13px;outline:none;font-family:var(--font)}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group select option{background:#1a1a1a}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rating-row{display:flex;gap:3px}
.rstar{font-size:20px;cursor:pointer;color:#2a2a2a;transition:color .1s;line-height:1}
.rstar.on{color:var(--accent)}
.cover-drop{border:1px dashed var(--border);border-radius:var(--radius-sm);padding:18px;text-align:center;cursor:pointer;position:relative;transition:border-color .12s}
.cover-drop:hover{border-color:#444}
.cover-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.cover-preview{width:100%;max-height:130px;object-fit:cover;border-radius:var(--radius-sm);margin-top:8px;display:block}
.check-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:4px}
.check-row input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent)}

/* empty */
.empty{text-align:center;padding:64px 20px;color:var(--muted)}
.empty i{font-size:40px;opacity:.15;display:block;margin-bottom:10px}

/* toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);color:var(--text);border:1px solid var(--border);padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);z-index:300;opacity:0;transform:translateY(6px);transition:all .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* auth */
.auth-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:5px 9px;border:1px solid var(--border);border-radius:var(--radius-sm)}
.auth-badge.authed{color:var(--accent);border-color:#3a2e12}
.lock-icon{font-size:32px;text-align:center;margin-bottom:14px;color:var(--accent)}
.err-msg{color:var(--danger);font-size:12px;text-align:center;margin-top:6px;min-height:16px}
.divider{height:1px;background:var(--border);margin:12px 0}

@media(max-width:600px){
  .app{padding:0 14px 32px}
  .form-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .header-right .btn span{display:none}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-row">
      <span class="app-name">Vinyl Collection</span>
      <span class="record-count" id="recordCount"></span>
    </div>
    <div class="header-right">
      <div class="auth-badge" id="authBadge"><i class="ti ti-lock"></i><span>visitor</span></div>
      <button class="btn" id="loginBtn"><i class="ti ti-login"></i><span>edit mode</span></button>
      <button class="btn" id="exportBtn"><i class="ti ti-download"></i><span>export csv</span></button>
      <label class="btn" id="importLabel" style="display:none">
        <i class="ti ti-upload"></i><span>import csv</span>
        <input type="file" accept=".csv" id="importInput" style="display:none">
      </label>
      <button class="btn btn-primary" id="addBtn" style="display:none">
        <i class="ti ti-plus"></i><span>add record</span>
      </button>
    </div>
  </header>

  <div class="toolbar">
    <div class="search">
      <i class="ti ti-search"></i>
      <input type="text" id="searchInput" placeholder="search artist, album, genre...">
    </div>
    <select id="haveItFilter">
      <option value="1">in collection</option>
      <option value="0">wishlist</option>
      <option value="">all records</option>
    </select>
    <select id="genreFilter"><option value="">all genres</option></select>
    <select id="buyerFilter"><option value="">all buyers</option></select>
    <select id="sortSel">
      <option value="bought_date">sort: date added ↓</option>
      <option value="artist">sort: artist</option>
      <option value="album_name">sort: album</option>
      <option value="year">sort: year ↓</option>
      <option value="my_rating">sort: my rating ↓</option>
      <option value="play_count">sort: plays ↓</option>
    </select>
    <div class="view-toggle">
      <button class="btn view-btn active" id="gridBtn" aria-label="Grid view"><i class="ti ti-layout-grid"></i></button>
      <button class="btn view-btn" id="listBtn" aria-label="List view"><i class="ti ti-list"></i></button>
    </div>
  </div>

  <div id="recordsContainer"></div>
</div>

<!-- Detail modal -->
<div class="overlay hidden" id="detailOverlay">
  <div class="modal" id="detailModal">
    <div class="modal-head">
      <span class="modal-title">record detail</span>
      <button class="btn btn-ghost btn-sm" onclick="closeDetail()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-foot" id="detailFoot"></div>
  </div>
</div>

<!-- Edit/Add modal -->
<div class="overlay hidden" id="formOverlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="formTitle">add record</span>
      <button class="btn btn-ghost btn-sm" onclick="closeForm()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="cover-drop" id="coverDrop">
        <input type="file" accept="image/*" id="coverInput">
        <div id="coverDropInner">
          <i class="ti ti-photo" style="font-size:24px;opacity:.2;display:block;margin-bottom:4px"></i>
          <span style="font-size:12px;color:var(--muted)">click to upload album cover</span>
        </div>
        <img id="coverPreview" class="cover-preview" style="display:none">
      </div>
      <div style="height:12px"></div>
      <div class="form-grid">
        <div class="form-group"><label>Artist</label><input id="fArtist" placeholder="artist name"></div>
        <div class="form-group"><label>Album name</label><input id="fAlbum" placeholder="album title"></div>
        <div class="form-group"><label>Year</label><input id="fYear" type="number" placeholder="1975"></div>
        <div class="form-group">
          <label>Genre</label>
          <select id="fGenre">
            <option value="">select genre</option>
            <option>Rock</option><option>Pop</option><option>Jazz</option><option>Blues</option>
            <option>Classical</option><option>Electronic</option><option>Hip-Hop</option>
            <option>R&B</option><option>Folk</option><option>Country</option><option>Latin</option>
            <option>Reggae</option><option>Metal</option><option>Punk</option><option>Soul</option>
            <option>Funk</option><option>Easy listening</option><option>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Bought date</label><input id="fDate" type="date"></div>
        <div class="form-group"><label>Bought at</label><input id="fWhere" placeholder="store / city"></div>
        <div class="form-group"><label>Bought by</label><input id="fBuyer" placeholder="name"></div>
        <div class="form-group"><label>Play count</label><input id="fPlays" type="number" min="0" value="0"></div>
        <div class="form-group"><label>Last cleaned</label><input id="fCleaned" type="date"></div>
      </div>
      <div class="form-group">
        <label>My rating (out of 10)</label>
        <div class="rating-row" id="myRatingRow"></div>
      </div>
      <div class="form-group">
        <label>Wife rating (out of 10)</label>
        <div class="rating-row" id="wifeRatingRow"></div>
      </div>
      <div class="check-row">
        <input type="checkbox" id="fHaveIt" checked>
        <label for="fHaveIt">in my collection (uncheck = wishlist)</label>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeForm()">cancel</button>
      <button class="btn btn-primary" id="formSaveBtn">save</button>
    </div>
  </div>
</div>

<!-- Login modal -->
<div class="overlay hidden" id="loginOverlay">
  <div class="modal" style="max-width:340px">
    <div class="modal-head">
      <span class="modal-title">edit mode</span>
      <button class="btn btn-ghost btn-sm" onclick="closeLogin()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="lock-icon"><i class="ti ti-lock"></i></div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pwInput" placeholder="enter password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="err-msg" id="loginErr"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeLogin()">cancel</button>
      <button class="btn btn-primary" onclick="doLogin()">unlock</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let records = [];
let authed = false;
let view = 'grid';
let editingId = null;
let myRating = 0, wifeRating = 0;
let coverDataUri = '';
let confirmDeleteId = null;

async function init() {
  await checkAuth();
  await loadRecords();
  buildRatingRows();
  bindEvents();
}

async function checkAuth() {
  const r = await fetch('/api/auth/status');
  const d = await r.json();
  setAuthed(d.authed);
}

function setAuthed(val) {
  authed = val;
  const badge = document.getElementById('authBadge');
  const loginBtn = document.getElementById('loginBtn');
  badge.className = 'auth-badge' + (val ? ' authed' : '');
  badge.innerHTML = val
    ? '<i class="ti ti-lock-open"></i><span>editing</span>'
    : '<i class="ti ti-lock"></i><span>visitor</span>';
  loginBtn.innerHTML = val
    ? '<i class="ti ti-logout"></i><span>lock</span>'
    : '<i class="ti ti-login"></i><span>edit mode</span>';
  document.getElementById('addBtn').style.display = val ? '' : 'none';
  document.getElementById('importLabel').style.display = val ? '' : 'none';
}

async function loadRecords() {
  const r = await fetch('/api/records');
  records = await r.json();
  render();
}

// ── filtering & sorting ────────────────────────────────────────────────────
function filtered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const g = document.getElementById('genreFilter').value;
  const b = document.getElementById('buyerFilter').value;
  const h = document.getElementById('haveItFilter').value;
  const s = document.getElementById('sortSel').value;

  return records.filter(r => {
    if (q && !`${r.artist} ${r.album_name} ${r.genre}`.toLowerCase().includes(q)) return false;
    if (g && r.genre !== g) return false;
    if (b && r.bought_by !== b) return false;
    if (h === '1' && !r.have_it) return false;
    if (h === '0' && r.have_it) return false;
    return true;
  }).sort((a, b_) => {
    if (s === 'bought_date') {
      const da = a.bought_date || '';
      const db = b_.bought_date || '';
      return db.localeCompare(da); // most recent first
    }
    if (['year','my_rating','play_count'].includes(s)) return (Number(b_[s])||0) - (Number(a[s])||0);
    return (a[s]||'').localeCompare(b_[s]||'');
  });
}

function render() {
  const recs = filtered();
  renderCount(recs.length);
  renderFilters();
  const c = document.getElementById('recordsContainer');
  if (!recs.length) {
    c.innerHTML = `<div class="empty"><i class="ti ti-disc"></i>${records.length ? 'no records match your filters.' : 'no records yet. add your first vinyl.'}</div>`;
    return;
  }
  if (view === 'grid') {
    c.innerHTML = `<div class="grid">${recs.map(r => cardHTML(r)).join('')}</div>`;
  } else {
    c.innerHTML = `<div class="list">${recs.map(r => listItemHTML(r)).join('')}</div>`;
  }
  c.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => openDetail(Number(el.dataset.id)));
  });
}

function renderCount(n) {
  const haveIt = document.getElementById('haveItFilter').value;
  const label = haveIt === '0' ? 'on wishlist' : haveIt === '1' ? 'in collection' : 'total';
  document.getElementById('recordCount').textContent = `— ${n} ${label}`;
}

function starsHTML(n, max=10) {
  let s='';
  for(let i=1;i<=max;i++) s+=`<span class="star${i<=n?'':' off'}">★</span>`;
  return `<div class="stars">${s}</div>`;
}

function cardHTML(r) {
  const cover = r.cover_data
    ? `<img src="${r.cover_data}" alt="${esc(r.album_name)}" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="no-cover"><i class="ti ti-disc"></i><span>no cover</span></div>`;
  return `<div class="vcard" data-id="${r.id}">
    <div class="vcard-cover">${cover}</div>
    <div class="vcard-body">
      <div class="vcard-artist">${esc(r.artist)||'unknown'}</div>
      <div class="vcard-album">${esc(r.album_name)||'untitled'}</div>
      <div class="vcard-foot">
        <span class="vcard-year">${esc(r.year)||'—'}</span>
        ${r.my_rating > 0 ? starsHTML(r.my_rating) : ''}
      </div>
    </div>
  </div>`;
}

function listItemHTML(r) {
  const thumb = r.cover_data
    ? `<img src="${r.cover_data}" alt="" style="width:42px;height:42px;object-fit:cover" onerror="this.style.display='none'">`
    : `<i class="ti ti-disc" style="font-size:18px;opacity:.15"></i>`;
  const dateStr = r.bought_date ? r.bought_date.slice(0,7) : '';
  return `<div class="litem" data-id="${r.id}">
    <div class="lthumb">${thumb}</div>
    <div class="linfo">
      <div class="lalbum">${esc(r.album_name)||'untitled'}</div>
      <div class="lartist">${esc(r.artist)||'unknown'}${r.year?' · '+r.year:''}</div>
    </div>
    <div class="lright">
      ${r.genre?`<span class="pill">${esc(r.genre)}</span>`:''}
      ${dateStr?`<span class="ldate">${dateStr}</span>`:''}
      ${r.my_rating>0?starsHTML(r.my_rating):''}
    </div>
  </div>`;
}

function renderFilters() {
  const genres = [...new Set(records.map(r=>r.genre).filter(Boolean))].sort();
  const buyers = [...new Set(records.map(r=>r.bought_by).filter(Boolean))].sort();
  const gf = document.getElementById('genreFilter');
  const curG = gf.value;
  gf.innerHTML = '<option value="">all genres</option>' + genres.map(g=>`<option${g===curG?' selected':''}>${esc(g)}</option>`).join('');
  const bf = document.getElementById('buyerFilter');
  const curB = bf.value;
  bf.innerHTML = '<option value="">all buyers</option>' + buyers.map(b=>`<option${b===curB?' selected':''}>${esc(b)}</option>`).join('');
  bf.style.display = buyers.length > 1 ? '' : 'none';
}

// ── detail modal ───────────────────────────────────────────────────────────
function openDetail(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  confirmDeleteId = null;
  const coverEl = r.cover_data
    ? `<img src="${r.cover_data}" class="detail-cover" alt="${esc(r.album_name)}" onerror="this.style.display='none'">`
    : `<div class="detail-cover-ph"><i class="ti ti-disc" style="font-size:48px"></i></div>`;
  const fields = [
    ['Year',r.year],['Genre',r.genre],
    ['Bought date',r.bought_date],['Bought at',r.bought_where],
    ['Bought by',r.bought_by],['My rating',r.my_rating?r.my_rating+'/10':'—'],
    ['Wife rating',r.wife_rating?r.wife_rating+'/10':'—'],['Play count',r.play_count||0],
    ['Last cleaned',r.last_cleaned||'—'],['In collection',r.have_it?'yes':'no (wishlist)'],
  ];
  document.getElementById('detailBody').innerHTML = `
    ${coverEl}
    <div class="detail-title">${esc(r.album_name)||'untitled'}</div>
    <div class="detail-artist">${esc(r.artist)||'unknown'}</div>
    <div class="detail-stars">${r.my_rating>0?starsHTML(r.my_rating):''}</div>
    <div class="detail-grid">
      ${fields.map(([l,v])=>`<div class="detail-item"><label>${l}</label><span>${esc(String(v||'—'))}</span></div>`).join('')}
    </div>`;
  renderDetailFoot(r.id);
  document.getElementById('detailOverlay').classList.remove('hidden');
}

function renderDetailFoot(id) {
  const foot = document.getElementById('detailFoot');
  if (confirmDeleteId === id) {
    foot.innerHTML = `
      <span style="font-size:12px;color:var(--muted);margin-right:auto">delete this record?</span>
      <button class="btn btn-danger btn-sm" onclick="doDelete(${id})">yes, delete</button>
      <button class="btn btn-sm" onclick="confirmDeleteId=null;renderDetailFoot(${id})">cancel</button>`;
  } else {
    foot.innerHTML = authed ? `
      <button class="btn btn-danger btn-sm" onclick="confirmDeleteId=${id};renderDetailFoot(${id})"><i class="ti ti-trash"></i> delete</button>
      <button class="btn" onclick="openEdit(${id})"><i class="ti ti-edit"></i> edit</button>` : '';
  }
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.add('hidden');
  confirmDeleteId = null;
}

async function doDelete(id) {
  await fetch(`/api/records/${id}`, {method:'DELETE'});
  records = records.filter(r => r.id !== id);
  closeDetail(); render();
  toast('record deleted');
}

// ── form modal ─────────────────────────────────────────────────────────────
function buildRatingRows() {
  ['myRatingRow','wifeRatingRow'].forEach((rowId, idx) => {
    const row = document.getElementById(rowId);
    for (let i = 1; i <= 10; i++) {
      const s = document.createElement('span');
      s.className = 'rstar'; s.textContent = '★';
      s.dataset.idx = idx; s.dataset.val = i;
      s.addEventListener('click', () => { if(idx===0){myRating=i}else{wifeRating=i} updateRatingUI(); });
      s.addEventListener('mouseenter', () => highlightStars(rowId, i));
      s.addEventListener('mouseleave', () => updateRatingUI());
      row.appendChild(s);
    }
  });
}

function highlightStars(rowId, n) {
  document.querySelectorAll(`#${rowId} .rstar`).forEach(s => s.classList.toggle('on', Number(s.dataset.val)<=n));
}

function updateRatingUI() {
  document.querySelectorAll('#myRatingRow .rstar').forEach(s => s.classList.toggle('on', Number(s.dataset.val)<=myRating));
  document.querySelectorAll('#wifeRatingRow .rstar').forEach(s => s.classList.toggle('on', Number(s.dataset.val)<=wifeRating));
}

function openAdd() {
  editingId=null; myRating=0; wifeRating=0; coverDataUri='';
  document.getElementById('formTitle').textContent='add record';
  ['fArtist','fAlbum','fYear','fWhere','fBuyer'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fGenre').value='';
  document.getElementById('fDate').value='';
  document.getElementById('fCleaned').value='';
  document.getElementById('fPlays').value='0';
  document.getElementById('fHaveIt').checked=true;
  document.getElementById('coverPreview').style.display='none';
  document.getElementById('coverDropInner').style.display='';
  updateRatingUI();
  document.getElementById('formSaveBtn').onclick=submitForm;
  document.getElementById('formOverlay').classList.remove('hidden');
}

function openEdit(id) {
  closeDetail();
  const r=records.find(x=>x.id===id); if(!r)return;
  editingId=id; myRating=Number(r.my_rating)||0; wifeRating=Number(r.wife_rating)||0; coverDataUri=r.cover_data||'';
  document.getElementById('formTitle').textContent='edit record';
  document.getElementById('fArtist').value=r.artist||'';
  document.getElementById('fAlbum').value=r.album_name||'';
  document.getElementById('fYear').value=r.year||'';
  document.getElementById('fGenre').value=r.genre||'';
  document.getElementById('fDate').value=r.bought_date||'';
  document.getElementById('fWhere').value=r.bought_where||'';
  document.getElementById('fBuyer').value=r.bought_by||'';
  document.getElementById('fPlays').value=r.play_count||0;
  document.getElementById('fCleaned').value=r.last_cleaned||'';
  document.getElementById('fHaveIt').checked=!!r.have_it;
  if(coverDataUri){
    document.getElementById('coverPreview').src=coverDataUri;
    document.getElementById('coverPreview').style.display='block';
    document.getElementById('coverDropInner').style.display='none';
  } else {
    document.getElementById('coverPreview').style.display='none';
    document.getElementById('coverDropInner').style.display='';
  }
  updateRatingUI();
  document.getElementById('formSaveBtn').onclick=submitForm;
  document.getElementById('formOverlay').classList.remove('hidden');
}

function closeForm() { document.getElementById('formOverlay').classList.add('hidden'); }

async function submitForm() {
  const body={
    artist:document.getElementById('fArtist').value,
    album_name:document.getElementById('fAlbum').value,
    year:document.getElementById('fYear').value,
    genre:document.getElementById('fGenre').value,
    bought_date:document.getElementById('fDate').value,
    bought_where:document.getElementById('fWhere').value,
    bought_by:document.getElementById('fBuyer').value,
    play_count:Number(document.getElementById('fPlays').value)||0,
    last_cleaned:document.getElementById('fCleaned').value,
    have_it:document.getElementById('fHaveIt').checked,
    my_rating:myRating, wife_rating:wifeRating, cover_data:coverDataUri,
  };
  const url=editingId?`/api/records/${editingId}`:'/api/records';
  const method=editingId?'PUT':'POST';
  const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const rec=await r.json();
  if(editingId){ records=records.map(x=>x.id===editingId?rec:x); toast('changes saved'); }
  else { records.push(rec); toast('record added'); }
  closeForm(); render();
}

// ── cover upload ───────────────────────────────────────────────────────────
document.getElementById('coverInput').addEventListener('change', e => {
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    coverDataUri=ev.target.result;
    document.getElementById('coverPreview').src=coverDataUri;
    document.getElementById('coverPreview').style.display='block';
    document.getElementById('coverDropInner').style.display='none';
  };
  reader.readAsDataURL(file);
  e.target.value='';
});

// ── login ──────────────────────────────────────────────────────────────────
function openLogin(){ document.getElementById('loginOverlay').classList.remove('hidden'); document.getElementById('pwInput').value=''; document.getElementById('loginErr').textContent=''; }
function closeLogin(){ document.getElementById('loginOverlay').classList.add('hidden'); }

async function doLogin(){
  const pw=document.getElementById('pwInput').value;
  const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  if(r.ok){ setAuthed(true); closeLogin(); render(); toast('edit mode unlocked'); }
  else { document.getElementById('loginErr').textContent='wrong password.'; }
}

async function doLogout(){
  await fetch('/api/auth/logout',{method:'POST'});
  setAuthed(false); render(); toast('locked');
}

// ── import / export ────────────────────────────────────────────────────────
document.getElementById('importInput').addEventListener('change', async e => {
  const file=e.target.files[0]; if(!file)return;
  const fd=new FormData(); fd.append('file',file);
  const r=await fetch('/api/import',{method:'POST',body:fd});
  const d=await r.json();
  if(d.imported!=null){ await loadRecords(); toast(`imported ${d.imported} records`); }
  else toast('import failed: '+(d.error||'unknown'));
  e.target.value='';
});

document.getElementById('exportBtn').addEventListener('click',()=>{ window.location.href='/api/export'; });

// ── events ─────────────────────────────────────────────────────────────────
function bindEvents(){
  document.getElementById('loginBtn').addEventListener('click',()=>authed?doLogout():openLogin());
  document.getElementById('addBtn').addEventListener('click',openAdd);
  document.getElementById('searchInput').addEventListener('input',render);
  document.getElementById('genreFilter').addEventListener('change',render);
  document.getElementById('buyerFilter').addEventListener('change',render);
  document.getElementById('haveItFilter').addEventListener('change',render);
  document.getElementById('sortSel').addEventListener('change',render);
  document.getElementById('gridBtn').addEventListener('click',()=>{ view='grid'; document.getElementById('gridBtn').classList.add('active'); document.getElementById('listBtn').classList.remove('active'); render(); });
  document.getElementById('listBtn').addEventListener('click',()=>{ view='list'; document.getElementById('listBtn').classList.add('active'); document.getElementById('gridBtn').classList.remove('active'); render(); });
  document.getElementById('detailOverlay').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeDetail(); });
  document.getElementById('formOverlay').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeForm(); });
  document.getElementById('loginOverlay').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeLogin(); });
}

let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
