<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zucoloto's Vinyl Collection</title>
<link rel="icon" type="image/png" href="/static/vinyl-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}

[data-theme="dark"]{
  --bg:#0c0c0c;--surface:#141414;--card:#181818;--border:#242424;
  --text:#e8e8e0;--muted:#555;--accent:#F5C518;--danger:#c0392b;
  --card-hover:#1f1f1f;--search-bg:transparent;
  --sh-gray:rgba(100,100,100,0.35);
  --toggle-icon:'☀'
}
[data-theme="light"]{
  --bg:#f4f2ee;--surface:#ffffff;--card:#ffffff;--border:#ddd9d0;
  --text:#1a1a18;--muted:#999;--accent:#a07820;--danger:#c0392b;
  --card-hover:#fafaf8;--search-bg:#ffffff;
  --sh-gray:rgba(0,0,0,0.18);
  --toggle-icon:'☾'
}

:root{--font:'Inter',system-ui,sans-serif;--font-mono:'Courier Prime',monospace;--radius:4px;--radius-sm:3px}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;letter-spacing:-.01em;transition:background .2s,color .2s}

.app{max-width:1200px;margin:0 auto;padding:0 24px 64px}

/* header */
header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 20px;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:24px}
.logo-row{display:flex;align-items:center;gap:12px}
.app-name{font-size:18px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-family:var(--font-mono)}
.record-count{font-size:13px;color:var(--muted)}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.vinyl-logo{flex-shrink:0;cursor:default}
@keyframes vinyl-glint{to{transform:rotate(360deg)}}

/* toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search{flex:1 1 340px;min-width:200px;max-width:480px;display:flex;align-items:center;gap:8px;background:var(--search-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;height:34px}
.search input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;width:100%;font-family:var(--font)}
.search i{color:var(--muted);font-size:15px}
select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 8px;height:34px;font-size:13px;outline:none;font-family:var(--font);cursor:pointer;transition:background .2s,color .2s,border .2s}
select:focus{border-color:var(--accent)}
select option{background:var(--surface);color:var(--text)}

/* buttons */
.btn{height:34px;padding:0 14px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap;transition:all .12s;font-family:var(--font);letter-spacing:0}
.btn:hover{border-color:var(--text);color:var(--text)}
.btn-primary{border-color:var(--accent);color:var(--accent)}
.btn-primary:hover{background:rgba(245,197,24,.08)}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-ghost{background:transparent;border:none;color:var(--muted);padding:0 6px}
.btn-ghost:hover{color:var(--text)}
.btn-danger{color:var(--danger);border-color:var(--border)}
.btn-danger:hover{border-color:var(--danger)}
.btn-icon{width:34px;padding:0;display:flex;align-items:center;justify-content:center;font-size:15px}

/* theme toggle */
.theme-btn{font-size:16px;padding:0 10px}

/* grid */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr)}}

/* vinyl card — shadow set inline by JS based on buyer + rating */
.vcard{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  transition:border-color .15s, box-shadow .3s, transform .15s;
  position:relative;
}
.vcard:hover{border-color:color-mix(in srgb, var(--text) 40%, transparent);transform:translateY(-2px)}

.vcard-cover{width:100%;aspect-ratio:1;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.vcard-cover img{width:100%;height:100%;object-fit:cover}
.vcard-cover .no-cover{display:flex;flex-direction:column;align-items:center;gap:4px;color:#2a2a2a;font-size:10px;font-family:var(--font)}
.vcard-cover .no-cover i{font-size:32px}
[data-theme="light"] .vcard-cover .no-cover{color:#ccc}

/* artist overlay on the cover */
.vcard-artist-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent, rgba(0,0,0,0.75));
  padding:18px 8px 7px;
  font-size:11px;font-weight:700;
  color:#fff;
  text-transform:uppercase;letter-spacing:.07em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  pointer-events:none;
}

.vcard-flag{
  position:absolute;top:8px;right:8px;
  font-size:26px;line-height:1;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,0.7));
  pointer-events:none;
}

.vcard-body{padding:8px 10px 10px}
/* row 1: album name + year inline */
.vcard-title-row{display:flex;align-items:baseline;justify-content:space-between;gap:6px;margin-bottom:8px}
.vcard-album{font-size:12px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.vcard-year{font-size:11px;color:var(--muted);flex-shrink:0;white-space:nowrap}
/* row 2: play editor + rating */
.vcard-bottom-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:7px}
.vcard-avg{font-size:17px;font-weight:700;color:var(--accent);letter-spacing:-.02em;line-height:1;flex-shrink:0}
.vcard-avg span{font-size:11px;font-weight:400;color:var(--muted);margin-left:1px}
/* play count (edit mode) */
.play-count-row{display:flex;align-items:center;gap:5px;}
.play-count-inline{font-size:11px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:3px;min-width:32px;text-align:center;}
.play-count-static{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px;}
.play-btn{width:22px;height:22px;border:none;border-radius:3px;background:var(--border);color:var(--text);cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;font-family:var(--font);flex-shrink:0;}
.play-btn:hover{background:var(--danger);color:#fff}
.play-btn:active{opacity:.7}
/* divider */
.vcard-divider{height:1px;background:var(--border);margin-bottom:7px}

/* segmented rating blocks: 5 squares per person */
.scores-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.score-squares{display:flex;gap:2px;flex:1}
.score-sq{flex:1;height:7px;border-radius:1.5px;background:var(--border)}
.score-sq.pepe-on{background:#F5C518}
.score-sq.jenni-on{background:#D4608A}
.score-sq.pepe-on.full{box-shadow:0 0 4px rgba(245,197,24,0.85)}
.score-sq.jenni-on.full{box-shadow:0 0 4px rgba(212,96,138,0.85)}
.score-sq.pepe-on.full.in-view{animation:sq-glow-pepe 1.1s ease-out 1 forwards}
.score-sq.jenni-on.full.in-view{animation:sq-glow-jenni 1.1s ease-out 1 forwards}
@keyframes sq-glow-pepe{
  0%{box-shadow:none;filter:brightness(1);transform:scale(1)}
  30%{box-shadow:0 0 6px rgba(245,197,24,1),0 0 14px rgba(245,197,24,0.9),0 0 22px rgba(245,197,24,0.6);filter:brightness(1.6);transform:scale(1.15)}
  100%{box-shadow:0 0 4px rgba(245,197,24,0.85);filter:brightness(1);transform:scale(1)}
}
@keyframes sq-glow-jenni{
  0%{box-shadow:none;filter:brightness(1);transform:scale(1)}
  30%{box-shadow:0 0 6px rgba(212,96,138,1),0 0 14px rgba(212,96,138,0.9),0 0 22px rgba(212,96,138,0.6);filter:brightness(1.6);transform:scale(1.15)}
  100%{box-shadow:0 0 4px rgba(212,96,138,0.85);filter:brightness(1);transform:scale(1)}
}
.scores-sep{width:1px;height:11px;background:var(--border);flex-shrink:0}

/* stars — used in detail modal only */
.stars-mini{display:flex;gap:1px}
.star{color:var(--accent)}
.star.off{color:var(--border)}
[data-theme="light"] .star.off{color:#ddd}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;transition:background .2s}
.modal.modal-wide{max-width:920px}
.detail-nav-btn{
  position:fixed;top:50%;transform:translateY(-50%);
  width:44px;height:44px;border-radius:50%;
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  cursor:pointer;z-index:101;transition:background .12s,border-color .12s,opacity .12s;
  opacity:.75;
}
.detail-nav-btn:hover{opacity:1;border-color:var(--accent);color:var(--accent)}
.detail-nav-btn.prev{left:max(16px, calc(50% - 500px))}
.detail-nav-btn.next{right:max(16px, calc(50% - 500px))}
@media(max-width:760px){
  .detail-nav-btn{display:none}
}

/* ── record navigation animation ─────────────────────────────────────────── */
.modal-body{perspective:1400px}
#detailBody{transform-style:preserve-3d;will-change:transform,opacity}

/* desktop: horizontal "flip the sleeve" transition */
@keyframes flip-out-left{
  0%{transform:rotateY(0deg) translateX(0);opacity:1}
  100%{transform:rotateY(-18deg) translateX(-60px);opacity:0}
}
@keyframes flip-out-right{
  0%{transform:rotateY(0deg) translateX(0);opacity:1}
  100%{transform:rotateY(18deg) translateX(60px);opacity:0}
}
@keyframes flip-in-left{
  0%{transform:rotateY(18deg) translateX(60px);opacity:0}
  100%{transform:rotateY(0deg) translateX(0);opacity:1}
}
@keyframes flip-in-right{
  0%{transform:rotateY(-18deg) translateX(-60px);opacity:0}
  100%{transform:rotateY(0deg) translateX(0);opacity:1}
}
#detailBody.flip-out-left{animation:flip-out-left .22s ease-in forwards}
#detailBody.flip-out-right{animation:flip-out-right .22s ease-in forwards}
#detailBody.flip-in-left{animation:flip-in-left .26s ease-out forwards}
#detailBody.flip-in-right{animation:flip-in-right .26s ease-out forwards}

/* mobile: vertical tiktok-style slide */
@keyframes slide-out-up{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(-48px);opacity:0}
}
@keyframes slide-out-down{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(48px);opacity:0}
}
@keyframes slide-in-up{
  0%{transform:translateY(48px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}
@keyframes slide-in-down{
  0%{transform:translateY(-48px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}
#detailBody.slide-out-up{animation:slide-out-up .18s ease-in forwards}
#detailBody.slide-out-down{animation:slide-out-down .18s ease-in forwards}
#detailBody.slide-in-up{animation:slide-in-up .22s ease-out forwards}
#detailBody.slide-in-down{animation:slide-in-down .22s ease-out forwards}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.modal-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.modal-body{padding:18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* detail — split layout: cover left, info right */
.detail-layout{display:grid;grid-template-columns:340px 1fr;gap:24px}
@media(max-width:760px){.detail-layout{grid-template-columns:1fr}}
.detail-cover-col{display:flex;flex-direction:column}
.detail-info-col{display:flex;flex-direction:column;min-width:0}
.detail-cover{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-sm);display:block;background:#0a0a0a;position:sticky;top:0}
[data-theme="light"] .detail-cover{background:#f0f0f0}
.detail-cover-ph{width:100%;aspect-ratio:1;background:#111;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:#222}
[data-theme="light"] .detail-cover-ph{background:#eee;color:#ccc}
.detail-title{font-size:20px;font-weight:700;margin-bottom:3px;line-height:1.2}
.detail-artist{font-size:11px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.07em}
.detail-ratings{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm)}
.detail-rating-block{display:flex;flex-direction:column;gap:6px}
.detail-rating-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.detail-rating-block.pepe .detail-rating-label{color:#F5C518}
.detail-rating-block.jenni .detail-rating-label{color:#D4608A}
.detail-dots{display:flex;gap:3px;flex-wrap:wrap}
.ddot{width:8px;height:8px;border-radius:50%;background:var(--border)}
[data-theme="light"] .ddot{background:#ddd}
.detail-rating-block.pepe .ddot.on{background:#F5C518}
.detail-rating-block.jenni .ddot.on{background:#D4608A}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:block;margin-bottom:2px}
.detail-item span{font-size:13px;font-weight:600}

/* ── mobile TikTok-style detail view ─────────────────────────────────────── */
.detail-mobile-layout{display:none}
@media(max-width:760px){
  #detailOverlay{padding:0}
  #detailOverlay .modal.modal-wide{
    max-width:none;width:100%;height:100%;max-height:100%;
    border-radius:0;border:none;display:flex;flex-direction:column;
  }
  #detailOverlay .modal-head{display:none}
  #detailOverlay .modal-body{padding:0;flex:1;overflow:hidden;display:flex}
  #detailOverlay #detailBody{flex:1;width:100%;min-width:0}
  #detailOverlay .modal-foot{
    position:absolute;bottom:0;left:0;right:0;z-index:5;
    background:linear-gradient(transparent, rgba(0,0,0,.55));border-top:none;
  }
  [data-theme="light"] #detailOverlay .modal-foot{background:linear-gradient(transparent, rgba(0,0,0,.25))}
  .detail-layout{display:none}
  .detail-mobile-layout{
    display:flex;flex-direction:column;width:100%;height:100%;
    position:relative;background:#000;overflow:hidden;
  }
  .detail-mobile-cover-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
  .detail-mobile-cover-wrap img{width:100%;height:100%;object-fit:cover}
  .detail-mobile-cover-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#3a3a3a}
  .detail-mobile-scrim{position:absolute;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,.45) 0%, transparent 22%, transparent 60%, rgba(0,0,0,.75) 100%)}

  /* right side rating rail — mirrors tiktok's like/comment/share stack */
  .detail-mobile-rail{
    position:absolute;right:10px;bottom:96px;z-index:3;
    display:flex;flex-direction:column;align-items:center;gap:18px;
  }
  .rail-item{display:flex;flex-direction:column;align-items:center;gap:3px}
  .rail-squares{display:flex;flex-direction:column;gap:3px}
  .rail-sq{width:20px;height:7px;border-radius:1.5px;background:rgba(255,255,255,.25)}
  .rail-sq.pepe-on{background:#F5C518}
  .rail-sq.jenni-on{background:#D4608A}
  .rail-label{font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.7);text-transform:uppercase;letter-spacing:.05em}
  .rail-total{font-size:22px;font-weight:800;color:#F5C518;text-shadow:0 1px 4px rgba(0,0,0,.8);line-height:1}
  .rail-total span{font-size:11px;font-weight:500;color:#fff;opacity:.8;margin-left:1px}

  /* bottom-left caption overlay — mirrors tiktok's post caption */
  .detail-mobile-caption{
    position:absolute;left:14px;right:74px;bottom:96px;z-index:3;
    color:#fff;
  }
  .detail-mobile-caption .dmc-album{font-size:16px;font-weight:700;line-height:1.25;margin-bottom:4px;text-shadow:0 1px 4px rgba(0,0,0,.7)}
  .detail-mobile-caption .dmc-meta{font-size:12px;opacity:.85;text-shadow:0 1px 3px rgba(0,0,0,.7)}
  .detail-mobile-caption .dmc-meta b{font-weight:700;opacity:1}
}

/* form */
.form-group{margin-bottom:12px}
.form-group label{font-size:10px;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 9px;font-size:13px;outline:none;font-family:var(--font);transition:background .2s,color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group select option{background:var(--surface)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rating-row{display:flex;gap:3px}
.rstar{font-size:20px;cursor:pointer;color:var(--border);transition:color .1s;line-height:1}
[data-theme="light"] .rstar{color:#ddd}
.rstar.on{color:var(--accent)}
.cover-drop{border:1px dashed var(--border);border-radius:var(--radius-sm);padding:18px;text-align:center;cursor:pointer;position:relative;transition:border-color .12s}
.cover-drop:hover{border-color:var(--accent)}
.cover-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.cover-preview{width:100%;max-height:130px;object-fit:cover;border-radius:var(--radius-sm);margin-top:8px;display:block}
.check-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:4px}
.check-row input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent)}

/* form — split layout: cover left, fields right (mirrors detail-layout) */
.form-layout{display:grid;grid-template-columns:340px 1fr;gap:24px}
@media(max-width:760px){.form-layout{grid-template-columns:1fr}}
.form-cover-col{display:flex;flex-direction:column}
.form-info-col{display:flex;flex-direction:column;min-width:0}
.form-cover-col .cover-drop{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px}
.form-cover-col .cover-preview{max-height:none;flex:1;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:var(--radius-sm)}
.form-cover-col .cover-drop{position:relative;overflow:hidden}

/* empty */
.empty{text-align:center;padding:64px 20px;color:var(--muted)}
.empty i{font-size:40px;opacity:.15;display:block;margin-bottom:10px}

/* spinner */
.spinner{display:flex;align-items:center;justify-content:center;padding:64px 20px}
.spinner-disc{width:40px;height:40px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);color:var(--text);border:1px solid var(--border);padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);z-index:300;opacity:0;transform:translateY(6px);transition:all .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* auth */
.auth-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:5px 9px;border:1px solid var(--border);border-radius:var(--radius-sm)}
.auth-badge.authed{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 40%,transparent)}
.lock-icon{font-size:32px;text-align:center;margin-bottom:14px;color:var(--accent)}
.err-msg{color:var(--danger);font-size:12px;text-align:center;margin-top:6px;min-height:16px}

/* nav tabs */
.nav-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.nav-tab{padding:10px 20px;font-size:13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:transparent;border-top:none;border-left:none;border-right:none;font-family:var(--font);display:inline-flex;align-items:center;gap:7px}
.nav-tab i{font-size:15px}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600}

/* stats page */
.stats-page{display:none}
.stats-page.visible{display:block}
.collection-page{display:block}
.collection-page.hidden{display:none}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-card-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.stat-card-value{font-size:28px;font-weight:700;line-height:1}
.stat-card-sub{font-size:11px;color:var(--muted);margin-top:4px}
.stat-card.pepe .stat-card-value{color:#F5C518}
.stat-card.jenni .stat-card-value{color:#D4608A}
.stat-card.both .stat-card-value{color:#9B7FD4}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.chart-title{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:14px;font-weight:600}
.chart-wrap{position:relative;height:240px}
.chart-wrap-tall{position:relative;height:300px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;color:var(--muted);min-width:110px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.bar-val{font-size:11px;color:var(--muted);min-width:32px;text-align:right}
@media(max-width:700px){.charts-row{grid-template-columns:1fr}}

/* genre multi-select dropdown */
.genre-dropdown{position:relative;flex-shrink:0}
.genre-trigger{height:34px;padding:0 12px;display:flex;align-items:center;gap:8px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:var(--font);white-space:nowrap;min-width:130px;justify-content:space-between}
.genre-trigger:hover{border-color:#444}
.genre-panel{position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);min-width:200px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.35);overflow:hidden}
.genre-panel.hidden{display:none}
.genre-toggle-all{padding:8px 12px;font-size:12px;color:var(--accent);cursor:pointer;border-bottom:1px solid var(--border);font-weight:600}
.genre-toggle-all:hover{background:var(--card)}
.genre-list{}
.genre-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:13px;transition:background .1s}
.genre-item:hover{background:var(--card)}
.genre-check{width:14px;height:14px;border-radius:3px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.genre-item.selected .genre-check{background:var(--accent);border-color:var(--accent)}
.genre-item.selected .genre-check::after{content:'✓';font-size:9px;color:#000;font-weight:700}

/* sort dropdown — custom, app-styled (mirrors genre-dropdown) */
.sort-dropdown{position:relative;flex-shrink:0}
.sort-trigger{height:34px;padding:0 10px;display:flex;align-items:center;gap:8px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-right:none;border-radius:var(--radius-sm) 0 0 var(--radius-sm);font-size:13px;cursor:pointer;font-family:var(--font);white-space:nowrap;min-width:150px}
.sort-trigger:hover{border-color:#444}
.sort-trigger i:first-child{font-size:15px;color:var(--muted);flex-shrink:0}
.sort-panel{position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);min-width:190px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.35);overflow:hidden}
.sort-panel.hidden{display:none}
.sort-list{max-height:280px;overflow-y:auto;padding:4px}
.sort-item{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;font-size:13px;border-radius:var(--radius-sm);transition:background .1s}
.sort-item:hover{background:var(--card)}
.sort-item i{font-size:15px;color:var(--muted);flex-shrink:0;width:16px;text-align:center}
.sort-item.selected{background:rgba(245,197,24,.10);color:var(--accent)}
.sort-item.selected i{color:var(--accent)}

/* buyer toggle */
.buyer-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;height:34px;flex-shrink:0}
.buyer-btn{padding:0 14px;font-size:13px;cursor:pointer;background:transparent;color:var(--muted);border:none;border-right:1px solid var(--border);font-family:var(--font);transition:all .12s;white-space:nowrap}
.buyer-btn:last-child{border-right:none}
.buyer-btn#btnPepe.active{background:rgba(245,197,24,.15);color:#F5C518}
.buyer-btn#btnJenni.active{background:rgba(212,96,138,.15);color:#D4608A}
.buyer-btn#btnBoth.active{background:rgba(155,127,212,.15);color:#9B7FD4}
.buyer-btn:not(.active){opacity:.45}

/* sort group: select + asc/desc direction toggle */
.sort-group{display:flex;align-items:center;gap:0;flex-shrink:0}
.sort-dir-btn{height:34px;width:30px;border:1px solid var(--border);border-left:none;border-radius:0 var(--radius-sm) var(--radius-sm) 0;background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:color .12s,background .12s}
.sort-dir-btn:hover{color:var(--text);background:var(--card)}

/* have-it icon toggle: collection (check) vs wishlist (cart) */
.haveit-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;height:34px;flex-shrink:0}
.haveit-btn{width:38px;height:100%;border:none;border-right:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .12s}
.haveit-btn:last-child{border-right:none}
.haveit-btn:not(.active){opacity:.4}
.haveit-btn.active[data-mode="collection"]{background:rgba(80,200,120,.15);color:#4cc471}
.haveit-btn.active[data-mode="wishlist"]{background:rgba(245,197,24,.15);color:#F5C518}

/* random dice button */
.dice-btn{width:34px;height:34px;padding:0;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.dice-btn:hover{border-color:var(--text)}
.dice-face{width:22px;height:22px;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;padding:3px;gap:1px}
.dice-pip{width:100%;height:100%;border-radius:50%;background:transparent}
.dice-pip.on{background:#e8e8e0}
.notes-editor{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.notes-editor textarea{resize:vertical;min-height:120px;font-family:var(--font-mono);font-size:12px;line-height:1.5}
.notes-preview{border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:12px;line-height:1.6;overflow-y:auto;min-height:120px;background:var(--card);color:var(--text)}
.notes-preview p,.detail-notes-body p{margin-bottom:6px}
.notes-preview h1,.notes-preview h2,.notes-preview h3,
.detail-notes-body h1,.detail-notes-body h2,.detail-notes-body h3{font-size:13px;font-weight:700;margin-bottom:4px;color:var(--accent)}
.notes-preview ul,.notes-preview ol,.detail-notes-body ul,.detail-notes-body ol{padding-left:16px;margin-bottom:6px}
.notes-preview code,.detail-notes-body code{background:var(--border);padding:1px 4px;border-radius:3px;font-family:var(--font-mono);font-size:11px}
.notes-preview blockquote,.detail-notes-body blockquote{border-left:2px solid var(--accent);padding-left:8px;color:var(--muted);margin:4px 0}
.detail-notes{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.detail-notes-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;font-weight:600}
.detail-notes-body{font-size:13px;line-height:1.7}

</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-row">
      <svg class="vinyl-logo" width="48" height="48" viewBox="0 0 44 44" aria-label="Vinyl collection logo">
        <circle cx="22" cy="22" r="21" fill="#9B7FD4"/>
        <circle cx="22" cy="22" r="16" fill="#F5C518"/>
        <circle cx="22" cy="22" r="8" fill="#D4608A"/>
        <circle cx="22" cy="22" r="6" fill="#111"/>
        <circle cx="22" cy="22" r="4.5" fill="none" stroke="#D4608A" stroke-width="0.7"/>
        <circle cx="22" cy="22" r="3" fill="none" stroke="#D4608A" stroke-width="0.7"/>
        <circle cx="22" cy="22" r="1.4" fill="#1a1a1a"/>
        <g style="animation:vinyl-glint 2s linear infinite;transform-origin:22px 22px">
          <path d="M22 1 A21 21 0 0 1 36 6" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
          <path d="M22 1 A21 21 0 0 1 29 3" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
        </g>
      </svg>
      <span class="app-name">Zucoloto's Vinyl Collection</span>
      <span class="record-count" id="recordCount"></span>
    </div>
    <div class="header-right">
      <button class="btn theme-btn btn-icon" id="themeBtn" title="Toggle theme">☀</button>
      <div class="auth-badge" id="authBadge" style="display:none"><i class="ti ti-lock"></i><span>visitor</span></div>
      <button class="btn" id="loginBtn"><i class="ti ti-login"></i><span>edit mode</span></button>
      <button class="btn" id="exportBtn"><i class="ti ti-download"></i><span>export</span></button>
      <label class="btn" id="importLabel" style="display:none">
        <i class="ti ti-upload"></i><span>import</span>
        <input type="file" accept=".csv" id="importInput" style="display:none">
      </label>
      <button class="btn btn-primary" id="addBtn" style="display:none">
        <i class="ti ti-plus"></i><span>add</span>
      </button>
    </div>
  </header>

  <div class="nav-tabs">
    <button class="nav-tab active" id="tabCollection"><i class="ti ti-layout-grid"></i> Collection</button>
    <button class="nav-tab" id="tabStats"><i class="ti ti-chart-bar"></i> Statistics</button>
  </div>

  <!-- stats page -->
  <div class="stats-page" id="statsPage">
    <div class="stats-grid" id="statsCards"></div>
    <div class="charts-row">
      <div class="chart-box">
        <div class="chart-title">avg rating by genre</div>
        <div class="chart-wrap-tall" id="radarWrap"><canvas id="radarChart"></canvas></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">records by genre</div>
        <div class="chart-wrap-tall" id="genreWrap"><canvas id="genreChart"></canvas></div>
      </div>
    </div>
    <div class="chart-box" style="margin-bottom:28px">
      <div class="chart-title">release year distribution</div>
      <div id="yearWrap" style="width:100%;height:360px"></div>
    </div>
  </div>

  <!-- collection page -->
  <div class="collection-page" id="collectionPage">
    <div class="toolbar">
    <div class="search">
      <i class="ti ti-search"></i>
      <input type="text" id="searchInput" placeholder="search artist, album, genre...">
    </div>
    <div class="sort-group">
      <div class="sort-dropdown" id="sortDropdown">
        <button class="sort-trigger" id="sortTrigger" onclick="toggleSortDropdown()">
          <i class="ti ti-calendar-event" id="sortTriggerIcon"></i>
          <span id="sortLabel">Date added</span>
          <i class="ti ti-chevron-down" id="sortChevron" style="font-size:12px;transition:transform .15s;margin-left:auto"></i>
        </button>
        <div class="sort-panel hidden" id="sortPanel">
          <div class="sort-list" id="sortList"></div>
        </div>
      </div>
      <button class="sort-dir-btn desc" id="sortDirBtn" title="toggle sort direction"><i class="ti ti-arrow-down"></i></button>
    </div>
    <div class="genre-dropdown" id="genreDropdown">
      <button class="genre-trigger" id="genreTrigger" onclick="toggleGenreDropdown()">
        <span id="genreLabel">all genres</span>
        <i class="ti ti-chevron-down" id="genreChevron" style="font-size:12px;transition:transform .15s"></i>
      </button>
      <div class="genre-panel hidden" id="genrePanel">
        <div class="genre-toggle-all" onclick="toggleAllGenres()">
          <span id="toggleAllLabel">deselect all</span>
        </div>
        <div class="genre-list" id="genreList"></div>
      </div>
    </div>
    <div class="buyer-toggle" id="buyerToggle">
      <button class="buyer-btn active" id="btnPepe"  onclick="toggleBuyer('pepe')">Pepe</button>
      <button class="buyer-btn active" id="btnBoth"  onclick="toggleBuyer('both')">Both</button>
      <button class="buyer-btn active" id="btnJenni" onclick="toggleBuyer('jenni')">Jenni</button>
    </div>
    <div class="haveit-toggle" id="haveItToggle">
      <button class="haveit-btn active" id="btnHaveCollection" data-mode="collection" title="in collection"><i class="ti ti-check"></i></button>
      <button class="haveit-btn" id="btnHaveWishlist" data-mode="wishlist" title="wishlist"><i class="ti ti-shopping-cart"></i></button>
    </div>
    <button class="dice-btn" id="randomBtn" title="random record">
      <div class="dice-face" id="diceFace"></div>
    </button>
    </div>
    <div id="recordsContainer"></div>
  </div>
</div>

<!-- Detail modal -->
<div class="overlay hidden" id="detailOverlay">
  <button class="detail-nav-btn prev" id="detailPrevBtn" title="previous record" onclick="navigateDetail(-1)"><i class="ti ti-chevron-left"></i></button>
  <div class="modal modal-wide">
    <div class="modal-head">
      <span class="modal-title">record detail</span>
      <button class="btn btn-ghost btn-sm" onclick="closeDetail()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-foot" id="detailFoot"></div>
  </div>
  <button class="detail-nav-btn next" id="detailNextBtn" title="next record" onclick="navigateDetail(1)"><i class="ti ti-chevron-right"></i></button>
</div>

<!-- Edit/Add modal -->
<div class="overlay hidden" id="formOverlay">
  <div class="modal modal-wide">
    <div class="modal-head">
      <span class="modal-title" id="formTitle">add record</span>
      <button class="btn btn-ghost btn-sm" onclick="closeForm()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-layout">
        <div class="form-cover-col">
          <div class="cover-drop">
            <input type="file" accept="image/*" id="coverInput">
            <div id="coverDropInner">
              <i class="ti ti-photo" style="font-size:24px;opacity:.2;display:block;margin-bottom:4px"></i>
              <span style="font-size:12px;color:var(--muted)">click to upload album cover</span>
            </div>
            <img id="coverPreview" class="cover-preview" style="display:none">
          </div>
        </div>
        <div class="form-info-col">
          <div class="form-grid">
            <div class="form-group"><label>Artist</label><input id="fArtist" placeholder="artist name"></div>
            <div class="form-group"><label>Album name</label><input id="fAlbum" placeholder="album title"></div>
            <div class="form-group"><label>Year</label><input id="fYear" type="number" placeholder="1975"></div>
            <div class="form-group">
              <label>Genre</label>
              <select id="fGenre">
                <option value="">select genre</option>
              </select>
            </div>
            <div class="form-group"><label>Bought date</label><input id="fDate" type="date"></div>
            <div class="form-group"><label>Bought at</label><input id="fWhere" placeholder="store / city"></div>
            <div class="form-group"><label>Bought by</label><input id="fBuyer" placeholder="name"></div>
            <div class="form-group"><label>Play count</label><input id="fPlays" type="number" min="0" value="0"></div>
            <div class="form-group"><label>Last cleaned</label><input id="fCleaned" type="date"></div>
            <div class="form-group">
              <label>Country</label>
              <input id="fCountry" list="countryList" placeholder="type to search…" autocomplete="off">
              <datalist id="countryList"></datalist>
            </div>
          </div>
          <div class="form-group">
            <label>Pepe rating (out of 5)</label>
            <div class="rating-row" id="myRatingRow"></div>
          </div>
          <div class="form-group">
            <label>Jenni rating (out of 5)</label>
            <div class="rating-row" id="wifeRatingRow"></div>
          </div>
          <div class="check-row">
            <input type="checkbox" id="fHaveIt" checked>
            <label for="fHaveIt">in my collection (uncheck = wishlist)</label>
          </div>
        </div>
      </div>
      <div class="form-group" style="margin-top:14px">
        <label>Notes <span style="font-weight:400;opacity:.5">(markdown)</span></label>
        <div class="notes-editor">
          <textarea id="fNotes" placeholder="Add notes, memories, thoughts…" oninput="updateNotesPreview()"></textarea>
          <div class="notes-preview" id="fNotesPreview"><span style="color:var(--muted);font-size:12px">preview…</span></div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeForm()">cancel</button>
      <button class="btn btn-primary" id="formSaveBtn">save</button>
    </div>
  </div>
</div>

<!-- Login modal -->
<div class="overlay hidden" id="loginOverlay">
  <div class="modal" style="max-width:340px">
    <div class="modal-head">
      <span class="modal-title">edit mode</span>
      <button class="btn btn-ghost btn-sm" onclick="closeLogin()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="lock-icon"><i class="ti ti-lock"></i></div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pwInput" placeholder="enter password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="err-msg" id="loginErr"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeLogin()">cancel</button>
      <button class="btn btn-primary" onclick="doLogin()">unlock</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
let records = [];
let authed = false;
let editingId = null;
let myRating = 0, wifeRating = 0;
let coverDataUri = '';
let confirmDeleteId = null;
let currentDetailId = null;

// ── theme ──────────────────────────────────────────────────────────────────
let theme = localStorage.getItem('vinyl-theme') || 'dark';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀' : '☾';
  localStorage.setItem('vinyl-theme', t);
}
applyTheme(theme);
document.getElementById('themeBtn').addEventListener('click', () => { applyTheme(theme === 'dark' ? 'light' : 'dark'); render(); if(currentTab==='stats') renderStats(); });

// ── shadow: flat buyer color, no rating influence ──────────────────────────
function cardStyles(r) {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  if (!r.have_it) {
    const g = isDark ? 'rgba(100,100,100,0.35)' : 'rgba(0,0,0,0.18)';
    return { shadow: `4px 4px 0 0 ${g}` };
  }

  const buyer = (r.bought_by || '').toLowerCase();
  const isPepe  = buyer.includes('pepe');
  const isJenni = buyer.includes('jenni') || buyer.includes('jenifer') || buyer.includes('jennifer');
  const isBoth  = isPepe && isJenni;

  let rgb;
  if (isBoth)       rgb = isDark ? '155,127,212' : '130,100,190';   // lavender
  else if (isPepe)  rgb = isDark ? '245,197,24'  : '200,155,10';    // electric yellow
  else if (isJenni) rgb = isDark ? '212,96,138'  : '180,60,110';    // pink
  else              rgb = isDark ? '245,197,24'  : '200,155,10';    // yellow default

  const opacity = isDark ? 0.70 : 0.55;
  return { shadow: `4px 4px 0 0 rgba(${rgb},${opacity})` };
}

// ── init ───────────────────────────────────────────────────────────────────
async function init() {
  await checkAuth();
  await loadRecords();
  buildRatingRows();
  buildSortList();
  syncSortTrigger();
  bindEvents();
}

async function checkAuth() {
  const r = await fetch('/api/auth/status');
  const d = await r.json();
  setAuthed(d.authed);
}

function setAuthed(val) {
  authed = val;
  const badge = document.getElementById('authBadge');
  badge.className = 'auth-badge' + (val ? ' authed' : '');
  badge.style.display = val ? '' : 'none';
  badge.innerHTML = val ? '<i class="ti ti-lock-open"></i><span>editing</span>' : '<i class="ti ti-lock"></i><span>visitor</span>';
  document.getElementById('loginBtn').innerHTML = val
    ? '<i class="ti ti-logout"></i><span>lock</span>'
    : '<i class="ti ti-login"></i><span>edit mode</span>';
  document.getElementById('addBtn').style.display = val ? '' : 'none';
  document.getElementById('importLabel').style.display = val ? '' : 'none';
  // Re-render cards to show/hide play count editors
  render();
}

async function loadRecords() {
  const c = document.getElementById('recordsContainer');
  c.innerHTML = '<div class="spinner"><div class="spinner-disc"></div></div>';
  const r = await fetch('/api/records');
  records = await r.json();
  render();
}

// avg uses only ratings that exist — if only one person rated, uses that score alone
function avgRating(r) {
  const scores = [Number(r.my_rating)||0, Number(r.wife_rating)||0].filter(x => x > 0);
  return scores.length ? scores.reduce((a,b)=>a+b,0) / scores.length : 0;
}

// ── filtering & sorting ────────────────────────────────────────────────────
let haveItMode = 'collection'; // 'collection' | 'wishlist'
let sortDir = 'desc'; // 'asc' | 'desc'
let sortBy = 'bought_date';

const SORT_OPTIONS = [
  { value: 'bought_date',  label: 'Date added',   icon: 'ti-calendar-event' },
  { value: 'artist',       label: 'Artist',        icon: 'ti-microphone-2' },
  { value: 'album_name',   label: 'Album',         icon: 'ti-disc' },
  { value: 'year',         label: 'Year',          icon: 'ti-calendar' },
  { value: 'avg_rating',   label: 'Total rating',  icon: 'ti-star-filled' },
  { value: 'my_rating',    label: 'Pepe rating',   icon: 'ti-star-half-filled' },
  { value: 'wife_rating',  label: 'Jenni rating',  icon: 'ti-star-half-filled' },
  { value: 'play_count',   label: 'Plays',         icon: 'ti-headphones' },
];

function filtered() {
  const q  = document.getElementById('searchInput').value.toLowerCase();
  const b  = { pepe: buyerActive.pepe, jenni: buyerActive.jenni, both: buyerActive.both };
  const s  = sortBy;

  const base = records.filter(r => {
    if (q && !`${r.artist} ${r.album_name} ${r.genre} ${r.bought_where||''} ${r.notes||''}`.toLowerCase().includes(q)) return false;
    if (selectedGenres.size > 0 && !selectedGenres.has(r.genre||'')) return false;
    // buyer toggle — each owner independently, 'other' always visible
    const o = ownerOf(r);
    if (o === 'pepe'  && !b.pepe)  return false;
    if (o === 'jenni' && !b.jenni) return false;
    if (o === 'both'  && !b.both)  return false;
    if (haveItMode === 'collection' && !r.have_it) return false;
    if (haveItMode === 'wishlist'   &&  r.have_it) return false;
    return true;
  }).sort((a, b_) => {
    let cmp;
    if (s === 'bought_date') cmp = (b_.bought_date||'').localeCompare(a.bought_date||'');
    else if (s === 'avg_rating')  cmp = avgRating(b_) - avgRating(a);
    else if (['year','my_rating','wife_rating','play_count'].includes(s)) cmp = (Number(b_[s])||0) - (Number(a[s])||0);
    else cmp = (a[s]||'').localeCompare(b_[s]||'');
    return sortDir === 'asc' ? -cmp : cmp;
  });
  return base;
}

function render() {
  const recs = filtered();
  renderCount(recs.length);
  renderFilters();
  const c = document.getElementById('recordsContainer');
  if (!recs.length) {
    c.innerHTML = `<div class="empty"><i class="ti ti-disc"></i>${records.length ? 'no records match your filters.' : 'no records yet. add your first vinyl.'}</div>`;
    return;
  }
  c.innerHTML = `<div class="grid">${recs.map(r => cardHTML(r)).join('')}</div>`;
  c.querySelectorAll('[data-id]').forEach(el =>
    el.addEventListener('click', () => openDetail(Number(el.dataset.id)))
  );
  observeCardsForGlow();
}

// ── trigger square-shine animation only once a card is actually visible ────
let glowObserver = null;
function observeCardsForGlow() {
  if (!glowObserver) {
    glowObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.querySelectorAll('.score-sq.full').forEach(sq => sq.classList.add('in-view'));
          glowObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
  }
  document.querySelectorAll('.vcard').forEach(card => {
    if (card.querySelector('.score-sq.full')) glowObserver.observe(card);
  });
}

function renderCount(n) {
  const label = haveItMode === 'wishlist' ? 'on wishlist' : 'in collection';
  document.getElementById('recordCount').textContent = `— ${n} ${label}`;
}

function starsHTML(n, max=5, size=9) {
  let s='';
  for(let i=1;i<=max;i++) s+=`<span class="star${i<=n?'':' off'}" style="font-size:${size}px">★</span>`;
  return `<div class="stars-mini">${s}</div>`;
}

function dotsHTML(n, max=5) {
  let d='';
  for(let i=1;i<=max;i++) d+=`<span class="dot${i<=n?' on':''}"></span>`;
  return `<div class="score-dots">${d}</div>`;
}

function cardHTML(r) {
  const styles = cardStyles(r);
  const cover = r.cover_data
    ? `<img src="${r.cover_data}" alt="${esc(r.album_name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-cover><i class=ti.ti-disc></i></div>'">`
    : `<div class="no-cover"><i class="ti ti-disc"></i></div>`;

  const myR  = Number(r.my_rating)  || 0;
  const herR = Number(r.wife_rating) || 0;
  const total = myR + herR;
  const totalStr = total > 0 ? (total % 1 === 0 ? total : total.toFixed(1)) : '—';
  const avgStyle = '';

  // glow on total score — stronger as it climbs toward 10
  const isDarkCard = document.documentElement.getAttribute('data-theme') === 'dark';
  let totalGlow = '';
  if      (total >= 9)   totalGlow = isDarkCard ? '0 0 10px rgba(245,197,24,0.95), 0 0 20px rgba(245,197,24,0.6)' : '0 0 8px rgba(200,155,10,0.8)';
  else if (total >= 7.5) totalGlow = isDarkCard ? '0 0 7px rgba(245,197,24,0.70)' : '0 0 6px rgba(200,155,10,0.55)';
  else if (total >= 6)   totalGlow = isDarkCard ? '0 0 5px rgba(245,197,24,0.40)' : '0 0 4px rgba(200,155,10,0.30)';
  const totalStyle = totalGlow ? ` style="text-shadow:${totalGlow}"` : '';

  const scoresBlock = (myR > 0 || herR > 0) ? (() => {
    const pepeFilled  = Math.round(myR);
    const jenniFilled = Math.round(herR);
    const pepeFullClass  = pepeFilled  >= 5 ? ' full' : '';
    const jenniFullClass = jenniFilled >= 5 ? ' full' : '';
    const sqDelay = i => ` style="animation-delay:${(i * 0.15).toFixed(2)}s"`;
    const pepeSquares  = Array.from({length:5}, (_,i) => `<div class="score-sq${i < pepeFilled ? ' pepe-on'+pepeFullClass : ''}"${pepeFullClass ? sqDelay(i) : ''}></div>`).join('');
    const jenniSquares = Array.from({length:5}, (_,i) => `<div class="score-sq${i < jenniFilled ? ' jenni-on'+jenniFullClass : ''}"${jenniFullClass ? sqDelay(i) : ''}></div>`).join('');
    return `
    <div class="vcard-divider"></div>
    <div class="scores-row">
      <div class="score-squares">${pepeSquares}</div>
      <div class="scores-sep"></div>
      <div class="score-squares">${jenniSquares}</div>
    </div>`;
  })() : '';

  return `<div class="vcard" data-id="${r.id}" style="box-shadow:${styles.shadow}">
    <div class="vcard-cover">
      ${cover}
      ${r.country ? `<div class="vcard-flag" title="${esc(countryLabelFromCode(r.country))}">${flagEmoji(r.country)}</div>` : ''}
      <div class="vcard-artist-overlay">${esc(r.artist)||'unknown'}</div>
    </div>
    <div class="vcard-body">
      <div class="vcard-title-row">
        <div class="vcard-album">${esc(r.album_name)||'untitled'}</div>
        <span class="vcard-year">${esc(r.year)||'—'}</span>
      </div>
      <div class="vcard-bottom-row" onclick="event.stopPropagation()">
        ${authed ? `
        <div class="play-count-row">
          <button class="play-btn" onclick="adjustPlayCount(${r.id}, -1)">−</button>
          <span class="play-count-inline"><i class="ti ti-headphones" style="font-size:9px;opacity:.45"></i><span id="playCount${r.id}">${r.play_count || 0}</span></span>
          <button class="play-btn" onclick="adjustPlayCount(${r.id}, +1)">+</button>
        </div>` : `<div class="play-count-static"><i class="ti ti-headphones" style="font-size:9px;opacity:.45"></i>${r.play_count || 0}</div>`}
        ${total > 0 ? `<span class="vcard-avg"${totalStyle}>${totalStr}<span>/10</span></span>` : ''}
      </div>
      ${scoresBlock}
    </div>
  </div>`;
}

function renderFilters() {
  const genres = [...new Set(records.map(r=>r.genre).filter(Boolean))].sort();
  // init selectedGenres with all genres if not set yet
  if (selectedGenres === null) {
    selectedGenres = new Set(genres);
    allGenres = genres;
  } else {
    // add any new genres
    genres.forEach(g => { if (!allGenres.includes(g)) { allGenres.push(g); selectedGenres.add(g); } });
    allGenres = genres;
  }
  buildGenreList();
}

function detailDotsHTML(n, max=5) {
  let d='';
  for(let i=1;i<=max;i++) d+=`<span class="ddot${i<=n?' on':''}"></span>`;
  return `<div class="detail-dots">${d}</div>`;
}

// ── detail modal ───────────────────────────────────────────────────────────

  const coverEl = r.cover_data
    ? `<img src="${r.cover_data}" class="detail-cover" alt="${esc(r.album_name)}" onerror="this.style.display='none'">`
    : `<div class="detail-cover-ph"><i class="ti ti-disc" style="font-size:48px"></i></div>`;
  const fields=[
    ['Year',r.year],['Genre',r.genre],
    ['Country', r.country ? `${flagEmoji(r.country)} ${countryLabelFromCode(r.country).replace(/\s*\([A-Z]{2}\)$/,'')}` : '—'],
    ['Bought date',r.bought_date],['Bought at',r.bought_where],
    ['Bought by',r.bought_by],['Play count',r.play_count||0],
    ['Last cleaned',r.last_cleaned||'—'],['In collection',r.have_it?'yes':'no (wishlist)'],
  ];
  const myR  = Number(r.my_rating)  || 0;
  const herR = Number(r.wife_rating) || 0;
  const detailTotal = myR + herR;
  const totalStr = detailTotal > 0 ? (detailTotal % 1 === 0 ? detailTotal : detailTotal.toFixed(1)) : '—';

  // mobile rail: 5-square indicator per person, same rounding convention as the card grid
  const railSquares = (val, cls) => {
    const filled = Math.round(val);
    return Array.from({length:5}, (_,i) => `<div class="rail-sq${i < filled ? ' '+cls : ''}"></div>`).reverse().join('');
  };
  const mobileCoverEl = r.cover_data
    ? `<img src="${r.cover_data}" alt="${esc(r.album_name)}" onerror="this.parentElement.innerHTML='<div class=detail-mobile-cover-ph><i class=&quot;ti ti-disc&quot; style=&quot;font-size:64px&quot;></i></div>'">`
    : `<div class="detail-mobile-cover-ph"><i class="ti ti-disc" style="font-size:64px"></i></div>`;

  document.getElementById('detailBody').innerHTML=`
    <div class="detail-layout">
      <div class="detail-cover-col">
        ${coverEl}
      </div>
      <div class="detail-info-col">
        <div class="detail-title">${esc(r.album_name)||'untitled'}</div>
        <div class="detail-artist">${esc(r.artist)||'unknown'}</div>
        <div class="detail-ratings">
          <div class="detail-rating-block pepe">
            <div class="detail-rating-label">Pepe <span style="font-weight:400;opacity:.6">${myR > 0 ? myR+'/5' : ''}</span></div>
            ${myR > 0 ? detailDotsHTML(myR) : '<span style="font-size:12px;color:var(--muted)">—</span>'}
          </div>
          <div class="detail-rating-block jenni">
            <div class="detail-rating-label">Jenni <span style="font-weight:400;opacity:.6">${herR > 0 ? herR+'/5' : ''}</span></div>
            ${herR > 0 ? detailDotsHTML(herR) : '<span style="font-size:12px;color:var(--muted)">—</span>'}
          </div>
        </div>
        ${detailTotal > 0 ? `<div style="font-size:13px;color:var(--muted);margin-bottom:14px">Total <strong style="color:var(--accent)">${totalStr}</strong><span style="font-size:11px">/10</span></div>` : ''}
        <div class="detail-grid">
          ${fields.map(([l,v])=>`<div class="detail-item"><label>${l}</label><span>${esc(String(v||'—'))}</span></div>`).join('')}
        </div>
        ${r.notes ? `<div class="detail-notes"><div class="detail-notes-label">Notes</div><div class="detail-notes-body">${marked.parse(r.notes)}</div></div>` : ''}
      </div>
    </div>
    <div class="detail-mobile-layout">
      <div class="detail-mobile-cover-wrap">${mobileCoverEl}</div>
      <div class="detail-mobile-scrim"></div>
      <div class="detail-mobile-rail">
        <div class="rail-item">
          <div class="rail-squares">${railSquares(myR, 'pepe-on')}</div>
          <div class="rail-label" style="color:#F5C518">Pepe</div>
        </div>
        <div class="rail-item">
          <div class="rail-squares">${railSquares(herR, 'jenni-on')}</div>
          <div class="rail-label" style="color:#D4608A">Jenni</div>
        </div>
        <div class="rail-item">
          <div class="rail-total">${totalStr}<span>/10</span></div>
          <div class="rail-label">Total</div>
        </div>
      </div>
      <div class="detail-mobile-caption">
        <div class="dmc-album">${esc(r.album_name)||'untitled'}</div>
        <div class="dmc-meta"><b>${esc(r.artist)||'unknown'}</b> · ${esc(r.year)||'—'}</div>

}

function openDetail(id) {
  const r = records.find(x=>x.id===id); if(!r)return;
  confirmDeleteId = null;
  currentDetailId = id;
  renderDetailContent(r);
  updateDetailNavVisibility();
  document.getElementById('detailOverlay').classList.remove('hidden');
}

// ── prev/next navigation through the currently filtered list ───────────────
function updateDetailNavVisibility() {
  const recs = filtered();
  const show = recs.length > 1;
  document.getElementById('detailPrevBtn').style.display = show ? '' : 'none';
  document.getElementById('detailNextBtn').style.display = show ? '' : 'none';
}

function isMobileDetailView() {
  return window.matchMedia('(max-width: 760px)').matches;
}

let detailAnimating = false;
function navigateDetail(delta) {
  if (detailAnimating) return;
  const recs = filtered();
  if (recs.length < 2) return;
  const idx = recs.findIndex(r => r.id === currentDetailId);
  const nextIdx = idx === -1 ? 0 : (idx + delta + recs.length) % recs.length;
  const nextRecord = recs[nextIdx];

  const body = document.getElementById('detailBody');
  const mobile = isMobileDetailView();

  // delta > 0 means "next": desktop flips to the left, mobile slides up (tiktok-style)
  const outClass = mobile ? (delta > 0 ? 'slide-out-up' : 'slide-out-down') : (delta > 0 ? 'flip-out-left' : 'flip-out-right');
  const inClass  = mobile ? (delta > 0 ? 'slide-in-up'  : 'slide-in-down')  : (delta > 0 ? 'flip-in-left'  : 'flip-in-right');

  detailAnimating = true;
  body.classList.remove('flip-out-left','flip-out-right','flip-in-left','flip-in-right','slide-out-up','slide-out-down','slide-in-up','slide-in-down');
  body.classList.add(outClass);

  const onOutEnd = () => {
    body.removeEventListener('animationend', onOutEnd);
    currentDetailId = nextRecord.id;
    renderDetailContent(nextRecord);
    updateDetailNavVisibility();
    body.classList.remove(outClass);
    body.classList.add(inClass);
    const onInEnd = () => {
      body.removeEventListener('animationend', onInEnd);
      body.classList.remove(inClass);
      detailAnimating = false;
    };
    body.addEventListener('animationend', onInEnd);
  };
  body.addEventListener('animationend', onOutEnd);
}

function renderDetailFoot(id) {
  const foot=document.getElementById('detailFoot');
  if(confirmDeleteId===id){
    foot.innerHTML=`
      <span style="font-size:12px;color:var(--muted);margin-right:auto">delete this record?</span>
      <button class="btn btn-danger btn-sm" onclick="doDelete(${id})">yes, delete</button>
      <button class="btn btn-sm" onclick="confirmDeleteId=null;renderDetailFoot(${id})">cancel</button>`;
  } else {
    foot.innerHTML=authed?`
      <button class="btn btn-danger btn-sm" onclick="confirmDeleteId=${id};renderDetailFoot(${id})"><i class="ti ti-trash"></i> delete</button>
      <button class="btn" onclick="openEdit(${id})"><i class="ti ti-edit"></i> edit</button>`:'';
  }
}

function closeDetail(){document.getElementById('detailOverlay').classList.add('hidden');confirmDeleteId=null;currentDetailId=null;}

async function doDelete(id){
  await fetch(`/api/records/${id}`,{method:'DELETE'});
  records=records.filter(r=>r.id!==id);
  closeDetail();render();toast('record deleted');
}

// ── form modal ─────────────────────────────────────────────────────────────
function buildRatingRows(){
  ['myRatingRow','wifeRatingRow'].forEach((rowId,idx)=>{
    const row=document.getElementById(rowId);
    for(let i=1;i<=5;i++){
      const s=document.createElement('span');
      s.className='rstar';s.textContent='★';s.dataset.idx=idx;s.dataset.val=i;
      s.addEventListener('click',()=>{if(idx===0){myRating=i}else{wifeRating=i};updateRatingUI();});
      s.addEventListener('mouseenter',()=>highlightStars(rowId,i));
      s.addEventListener('mouseleave',()=>updateRatingUI());
      row.appendChild(s);
    }
  });
}

function highlightStars(rowId,n){
  document.querySelectorAll(`#${rowId} .rstar`).forEach(s=>s.classList.toggle('on',Number(s.dataset.val)<=n));
}
function updateRatingUI(){
  document.querySelectorAll('#myRatingRow .rstar').forEach(s=>s.classList.toggle('on',Number(s.dataset.val)<=myRating));
  document.querySelectorAll('#wifeRatingRow .rstar').forEach(s=>s.classList.toggle('on',Number(s.dataset.val)<=wifeRating));
}

function populateGenreSelect(current='') {
  const genres = [...new Set(records.map(r=>r.genre).filter(Boolean))].sort();
  const sel = document.getElementById('fGenre');
  sel.innerHTML = '<option value="">select genre</option>'
    + genres.map(g=>`<option${g===current?' selected':''}>${esc(g)}</option>`).join('');
}

// ── country picker (datalist: "Country Name (XX)" <-> "XX" code) ───────────
function populateCountryList() {
  const dl = document.getElementById('countryList');
  dl.innerHTML = COUNTRIES.map(([code,name]) => `<option value="${esc(name)} (${code})">`).join('');
}

function countryLabelFromCode(code) {
  if (!code) return '';
  const found = COUNTRIES.find(([c]) => c === code.toUpperCase());
  return found ? `${found[1]} (${found[0]})` : '';
}

function countryCodeFromInput(value) {
  if (!value) return '';
  const m = value.match(/\(([A-Za-z]{2})\)\s*$/);
  if (m) return m[1].toUpperCase();
  // fallback: exact name match without the "(XX)" suffix typed
  const found = COUNTRIES.find(([,name]) => name.toLowerCase() === value.trim().toLowerCase());
  return found ? found[0] : '';
}

function updateNotesPreview(){
  const val = document.getElementById('fNotes').value;
  const el = document.getElementById('fNotesPreview');
  el.innerHTML = val ? marked.parse(val) : '<span style="color:var(--muted);font-size:12px">preview…</span>';
}

function openAdd(){
  editingId=null;myRating=0;wifeRating=0;coverDataUri='';
  document.getElementById('formTitle').textContent='add record';
  ['fArtist','fAlbum','fYear','fWhere','fBuyer','fCountry'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fDate').value='';
  document.getElementById('fCleaned').value='';document.getElementById('fPlays').value='0';
  document.getElementById('fHaveIt').checked=true;
  document.getElementById('fNotes').value='';
  updateNotesPreview();
  populateGenreSelect();
  populateCountryList();
  document.getElementById('coverPreview').style.display='none';
  document.getElementById('coverDropInner').style.display='';
  updateRatingUI();
  document.getElementById('formSaveBtn').onclick=submitForm;
  document.getElementById('formOverlay').classList.remove('hidden');
}

function openEdit(id){
  closeDetail();
  const r=records.find(x=>x.id===id);if(!r)return;
  editingId=id;myRating=Number(r.my_rating)||0;wifeRating=Number(r.wife_rating)||0;coverDataUri=r.cover_data||'';
  document.getElementById('formTitle').textContent='edit record';
  document.getElementById('fArtist').value=r.artist||'';
  document.getElementById('fAlbum').value=r.album_name||'';
  document.getElementById('fYear').value=r.year||'';
  document.getElementById('fDate').value=r.bought_date||'';
  populateGenreSelect(r.genre||'');
  populateCountryList();
  document.getElementById('fCountry').value=countryLabelFromCode(r.country||'');
  document.getElementById('fWhere').value=r.bought_where||'';
  document.getElementById('fBuyer').value=r.bought_by||'';
  document.getElementById('fPlays').value=r.play_count||0;
  document.getElementById('fCleaned').value=r.last_cleaned||'';
  document.getElementById('fHaveIt').checked=!!r.have_it;
  document.getElementById('fNotes').value=r.notes||'';
  updateNotesPreview();
  if(coverDataUri){
    document.getElementById('coverPreview').src=coverDataUri;
    document.getElementById('coverPreview').style.display='block';
    document.getElementById('coverDropInner').style.display='none';
  } else {
    document.getElementById('coverPreview').style.display='none';
    document.getElementById('coverDropInner').style.display='';
  }
  updateRatingUI();
  document.getElementById('formSaveBtn').onclick=submitForm;
  document.getElementById('formOverlay').classList.remove('hidden');
}

function closeForm(){document.getElementById('formOverlay').classList.add('hidden');}

async function submitForm(){
  const body={
    artist:document.getElementById('fArtist').value,
    album_name:document.getElementById('fAlbum').value,
    year:document.getElementById('fYear').value,
    genre:document.getElementById('fGenre').value,
    bought_date:document.getElementById('fDate').value,
    bought_where:document.getElementById('fWhere').value,
    bought_by:document.getElementById('fBuyer').value,
    play_count:Number(document.getElementById('fPlays').value)||0,
    last_cleaned:document.getElementById('fCleaned').value,
    have_it:document.getElementById('fHaveIt').checked,
    my_rating:myRating,wife_rating:wifeRating,cover_data:coverDataUri,
    notes:document.getElementById('fNotes').value,
    country:countryCodeFromInput(document.getElementById('fCountry').value),
  };
  const url=editingId?`/api/records/${editingId}`:'/api/records';
  const method=editingId?'PUT':'POST';
  const res=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const rec=await res.json();
  if(editingId){records=records.map(x=>x.id===editingId?rec:x);toast('changes saved');}
  else{records.push(rec);toast('record added');}
  closeForm();render();
}

document.getElementById('coverInput').addEventListener('change',e=>{

});

// ── import / export ────────────────────────────────────────────────────────
document.getElementById('importInput').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  const fd=new FormData();fd.append('file',file);
  const r=await fetch('/api/import',{method:'POST',body:fd});
  const d=await r.json();
  if(d.imported!=null){await loadRecords();toast(`imported ${d.imported} records`);}
  else toast('import failed: '+(d.error||'unknown'));

// ── detail modal: touch swipe navigation ────────────────────────────────────
// Mobile: vertical swipe, tiktok-style (swipe up -> next, swipe down -> prev)
// Desktop/tablet touchscreens: horizontal swipe (swipe left -> next, swipe right -> prev)
function initDetailSwipe() {
  const overlay = document.getElementById('detailOverlay');
  let startX = 0, startY = 0, tracking = false;
  const THRESHOLD = 50;

  overlay.addEventListener('touchstart', e => {
    if (overlay.classList.contains('hidden')) return;
    if (e.target.closest('.detail-nav-btn, .modal-foot, button, a, input, textarea')) { tracking = false; return; }
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    tracking = true;
  }, { passive: true });

  overlay.addEventListener('touchend', e => {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (isMobileDetailView()) {
      if (Math.abs(dy) < THRESHOLD || Math.abs(dy) < Math.abs(dx)) return;
      navigateDetail(dy < 0 ? 1 : -1); // swipe up -> next, swipe down -> prev
    } else {
      if (Math.abs(dx) < THRESHOLD || Math.abs(dx) < Math.abs(dy)) return;
      navigateDetail(dx < 0 ? 1 : -1); // swipe left -> next, swipe right -> prev
    }
  }, { passive: true });
}

// ── country flag helper: ISO 3166-1 alpha-2 code -> flag emoji ─────────────
function flagEmoji(code) {
  if (!code || code.length !== 2) return '';
  const cc = code.toUpperCase();
  if (!/^[A-Z]{2}$/.test(cc)) return '';
  const base = 0x1F1E6; // regional indicator symbol letter A
  return String.fromCodePoint(base + (cc.charCodeAt(0) - 65), base + (cc.charCodeAt(1) - 65));
}

// ── play count editor ──────────────────────────────────────────────────────
async function adjustPlayCount(id, delta) {
  const record = records.find(r => r.id === id);
  if (!record) return;
  
  const newCount = Math.max(0, (record.play_count || 0) + delta);
  
  // Update local state
  record.play_count = newCount;
  
  // Update UI immediately
  const countEl = document.getElementById(`playCount${id}`);
  if (countEl) countEl.textContent = newCount;
  
  // Save to database
  try {
    const res = await fetch(`/api/records/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ play_count: newCount })
    });
    if (!res.ok) {
      // Revert on error
      record.play_count = (record.play_count || 0) - delta;
      if (countEl) countEl.textContent = record.play_count;
      toast('failed to update play count');
    }
  } catch (err) {
    record.play_count = (record.play_count || 0) - delta;
    if (countEl) countEl.textContent = record.play_count;
    toast('error updating play count');
  }
}

// ── statistics ─────────────────────────────────────────────────────────────
function ownerOf(r) {
  const b = (r.bought_by || '').toLowerCase();
  const p = b.includes('pepe');
  const j = b.includes('jenni') || b.includes('jenifer') || b.includes('jennifer') || b.includes('jenni');
  if (p && j) return 'both';
  if (p) return 'pepe';
  if (j) return 'jenni';
  return 'other'; // no known buyer — always shown
}

function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

function isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
function gridColor() { return isDark() ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)'; }
function textColor() { return isDark() ? '#888' : '#999'; }

function renderStats() {
  const all = records.filter(r => r.have_it);
  const pepeR = all.filter(r => ownerOf(r) === 'pepe');
  const jenniR = all.filter(r => ownerOf(r) === 'jenni');
  const bothR  = all.filter(r => ownerOf(r) === 'both');

  const avgOf = (arr, key) => {
    const vals = arr.map(r => Number(r[key])||0).filter(x => x > 0);
    return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : '—';
  };

  // ── stat cards ────────────────────────────────────────────────────────────
  document.getElementById('statsCards').innerHTML = `
    <div class="stat-card pepe">
      <div class="stat-card-label">Pepe's records</div>
      <div class="stat-card-value">${pepeR.length}</div>
      <div class="stat-card-sub">avg rating ${avgOf(pepeR,'my_rating')}</div>
    </div>
    <div class="stat-card jenni">
      <div class="stat-card-label">Jenni's records</div>
      <div class="stat-card-value">${jenniR.length}</div>
      <div class="stat-card-sub">avg rating ${avgOf(jenniR,'wife_rating')}</div>
    </div>
    <div class="stat-card both">
      <div class="stat-card-label">Bought together</div>
      <div class="stat-card-value">${bothR.length}</div>
      <div class="stat-card-sub">avg rating ${avgOf(bothR,'my_rating')}</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Pepe avg rating</div>
      <div class="stat-card-value" style="color:#F5C518">${avgOf(all,'my_rating')}</div>
      <div class="stat-card-sub">across all records</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Jenni avg rating</div>
      <div class="stat-card-value" style="color:#D4608A">${avgOf(all,'wife_rating')}</div>
      <div class="stat-card-sub">across all records</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Total in collection</div>
      <div class="stat-card-value">${all.length}</div>
      <div class="stat-card-sub">${records.filter(r=>!r.have_it).length} on wishlist</div>
    </div>
  `;

  // ── radar: avg rating per genre ───────────────────────────────────────────
  const genreMap = {};
  all.forEach(r => {
    const g = r.genre || 'Unknown';
    if (!genreMap[g]) genreMap[g] = {pepe:[],jenni:[]};
    if (Number(r.my_rating) > 0) genreMap[g].pepe.push(Number(r.my_rating));
    if (Number(r.wife_rating) > 0) genreMap[g].jenni.push(Number(r.wife_rating));
  });
  const genres = Object.keys(genreMap).sort();
  const radarPepe  = genres.map(g => genreMap[g].pepe.length  ? (genreMap[g].pepe.reduce((a,b)=>a+b,0)/genreMap[g].pepe.length) : 0);
  const radarJenni = genres.map(g => genreMap[g].jenni.length ? (genreMap[g].jenni.reduce((a,b)=>a+b,0)/genreMap[g].jenni.length) : 0);

  destroyChart('radar');
  chartInstances['radar'] = new Chart(document.getElementById('radarChart'), {
    type: 'radar',
    data: {
      labels: genres,
      datasets: [
        { label:'Pepe',  data:radarPepe,  borderColor:'#F5C518', backgroundColor:'rgba(245,197,24,0.12)', pointBackgroundColor:'#F5C518', borderWidth:2 },
        { label:'Jenni', data:radarJenni, borderColor:'#D4608A', backgroundColor:'rgba(212,96,138,0.12)', pointBackgroundColor:'#D4608A', borderWidth:2 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      scales:{ r:{ min:0, max:5, ticks:{ stepSize:1, color:textColor(), font:{size:10}, backdropColor:'transparent' }, grid:{ color:gridColor() }, angleLines:{ color:gridColor() }, pointLabels:{ color:textColor(), font:{size:11} } } },
      plugins:{ legend:{ labels:{ color:textColor(), font:{size:12}, boxWidth:12 } } }
    }
  });

  // ── horizontal bar: records per genre ────────────────────────────────────
  const genreCounts = {};
  all.forEach(r => { const g = r.genre||'Unknown'; genreCounts[g] = (genreCounts[g]||0)+1; });
  const sortedGenres = Object.entries(genreCounts).sort((a,b)=>b[1]-a[1]);

  const GENRE_COLORS = [
    '#F5C518','#D4608A','#9B7FD4','#4A90C4','#1D9E75',
    '#E8750A','#E05555','#7BAE7F','#3DBFA0','#C4A0E0',
    '#E8956A','#5BA3D9','#B56A8A','#639922','#888780',
  ];
  const bgColors  = sortedGenres.map((_,i) => GENRE_COLORS[i % GENRE_COLORS.length] + 'BF'); // 75% opacity
  const brdColors = sortedGenres.map((_,i) => GENRE_COLORS[i % GENRE_COLORS.length]);

  destroyChart('genre');
  chartInstances['genre'] = new Chart(document.getElementById('genreChart'), {
    type: 'bar',
    data: {
      labels: sortedGenres.map(([g])=>g),
      datasets: [{
        data: sortedGenres.map(([,c])=>c),
        backgroundColor: bgColors,
        borderColor: brdColors,
        borderWidth: 1,
        borderRadius: 3,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid:{ color:gridColor() }, ticks:{ color:textColor(), font:{size:11}, stepSize:1 } },
        y: { grid:{ display:false }, ticks:{ color:textColor(), font:{size:11} } }
      }
    }
  });

  // ── D3 ridgeline areas: release year by owner ─────────────────────────────
  const wrap = document.getElementById('yearWrap');
  wrap.innerHTML = '';

  const dark = isDark();
  const COLORS_YEAR = { pepe:'#F5C518', jenni:'#D4608A', both:'#9B7FD4' };
  const FILL_YEAR   = { pepe:'rgba(245,197,24,0.45)', jenni:'rgba(212,96,138,0.45)', both:'rgba(155,127,212,0.45)' };

  const yearData = { pepe:[], jenni:[], both:[] };
  all.forEach(r => {
    const y = parseInt(r.year);
    if (!isNaN(y) && y > 1900 && y <= 2030) {
      const o = ownerOf(r);
      if (yearData[o]) yearData[o].push(y);
    }
  });

  const allYears = [...yearData.pepe, ...yearData.jenni, ...yearData.both];
  if (!allYears.length) { wrap.innerHTML = '<p style="color:var(--muted);padding:20px;font-size:13px">No year data</p>'; return; }

  const W = wrap.clientWidth || 660;
  const laneH = 80;
  const laneGap = 10;
  const ml = 52, mr = 20, mt = 16, mb = 32;
  const owners = ['pepe','jenni','both'];
  const totalH = mt + owners.length * (laneH + laneGap) - laneGap + mb;

  const svg = d3.select(wrap).append('svg')
    .attr('width', '100%').attr('height', totalH)
    .attr('viewBox', `0 0 ${W} ${totalH}`);

  const xMin = d3.min(allYears) - 3;
  const xMax = d3.max(allYears) + 3;
  const x = d3.scaleLinear().domain([xMin, xMax]).range([ml, W - mr]);

  const tc = dark ? '#666' : '#aaa';
  const gc = dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';

  const binner = d3.bin().domain([xMin, xMax]).thresholds(d3.range(xMin, xMax, 4));

  owners.forEach((o, oi) => {
    const baseY = mt + oi * (laneH + laneGap) + laneH;
    const bins = binner(yearData[o]);
    const maxC = Math.max(...bins.map(b => b.length), 1);
    const yScale = d3.scaleLinear().domain([0, maxC]).range([0, laneH * 0.9]);

    // subtle lane background
    svg.append('rect')
      .attr('x', ml).attr('y', baseY - laneH)
      .attr('width', W - ml - mr).attr('height', laneH)
      .attr('fill', gc).attr('rx', 3);

    // baseline
    svg.append('line')
      .attr('x1', ml).attr('x2', W - mr)
      .attr('y1', baseY).attr('y2', baseY)
      .attr('stroke', dark ? '#333' : '#ddd').attr('stroke-width', 1);

    // build smooth area points from bins
    const pts = bins.map(b => [(x(b.x0) + x(b.x1)) / 2, baseY - yScale(b.length)]);

    const areaGen = d3.area()
      .x(d => d[0]).y0(baseY).y1(d => d[1])
      .curve(d3.curveCatmullRom.alpha(0.5));

    const lineGen = d3.line()
      .x(d => d[0]).y(d => d[1])
      .curve(d3.curveCatmullRom.alpha(0.5));

    svg.append('path').attr('d', areaGen(pts))
      .attr('fill', FILL_YEAR[o]);

    svg.append('path').attr('d', lineGen(pts))
      .attr('fill', 'none')
      .attr('stroke', COLORS_YEAR[o])
      .attr('stroke-width', 2);

    // individual rug ticks on baseline
    yearData[o].forEach(yr => {
      svg.append('line')
        .attr('x1', x(yr)).attr('x2', x(yr))
        .attr('y1', baseY).attr('y2', baseY + 5)
        .attr('stroke', COLORS_YEAR[o])
        .attr('stroke-width', 1.5).attr('opacity', 0.7);
    });

    // owner label
    svg.append('text')
      .attr('x', ml - 6).attr('y', baseY - laneH / 2 + 4)
      .attr('text-anchor', 'end')
      .attr('fill', COLORS_YEAR[o])
      .attr('font-size', 11).attr('font-weight', 600)
      .text(o.toUpperCase());
  });

  // x axis
  const xAxisY = mt + owners.length * (laneH + laneGap) - laneGap;
  const xAxis = d3.axisBottom(x).ticks(10).tickFormat(d3.format('d'));
  svg.append('g').attr('transform', `translate(0,${xAxisY})`)
    .call(xAxis)
    .call(g => g.select('.domain').attr('stroke', dark ? '#333' : '#ddd'))
    .call(g => g.selectAll('.tick line').attr('stroke', dark ? '#333' : '#ddd'))
    .call(g => g.selectAll('.tick text').attr('fill', tc).attr('font-size', 10));
}

init();
</script>
</body>
</html>
